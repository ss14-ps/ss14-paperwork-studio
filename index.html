<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="css.css">
<title>SS14 Paperwork Studio v1.11</title>
<script>
(()=>{try{const theme=localStorage.getItem("ss14-visual-theme")||"archive";document.documentElement.dataset.theme=["archive","minimal","retro"].includes(theme)?theme:"archive"}catch{document.documentElement.dataset.theme="archive"}document.documentElement.classList.add("app-booting")})();
</script>
</head>
<body>
<header class="topbar">
  <div class="logo">NT</div>
  <div class="brand"><strong>АРХИВ NT</strong><small>РЕДАКТОР ДОКУМЕНТОВ SPACE STATION 14</small></div>
  <div class="top-actions">
    <button class="sound-control" id="keySoundToggle" type="button" aria-pressed="false" aria-label="Звуки клавиатуры" title="Звуки клавиатуры"></button>
    <div class="theme-control" title="Внешний вид интерфейса">
      <label for="themeSelect">Тема</label>
      <select id="themeSelect" aria-label="Выбор визуальной темы">
        <option value="archive">Архивная</option>
        <option value="minimal">Минимализм</option>
        <option value="retro">Retro 98</option>
      </select>
    </div>
    <button class="soft-btn archive-action" id="draftsBtn">▤ <span data-i18n="drafts"></span><i id="draftIndicator"></i></button>
    <button class="soft-btn archive-action" id="importTextBtn">↥ <span>Импорт</span></button>
    <button class="soft-btn archive-action" id="newBtn">＋ <span data-i18n="newSheet"></span></button>
    <button class="primary-btn" id="copyBtn">⧉ <span data-i18n="copy"></span></button>
  </div>
</header>

<div class="workspace">
  <aside class="panel sidebar">
    <div class="finder-head">
      <span class="eyebrow" data-i18n="finderOverline"></span>
      <h2 data-i18n="finderTitle"></h2>
      <div class="smart-search">
        <span>⌕</span>
        <input id="presetSearch" data-i18n-placeholder="smartSearch">
        <button id="clearSearch" title="Очистить">×</button>
      </div>
      <div class="search-hint" data-i18n="searchHint"></div>
      <div class="finder-tabs">
        <button class="active" data-finder-mode="find" data-i18n="findMode"></button>
        <button data-finder-mode="browse" data-i18n="browseMode"></button>
      </div>
      <div class="action-chips" id="actionChips"></div>
    </div>
    <div class="preset-list smart-list" id="presetList"></div>
    <div class="sidebar-footer" hidden>
      <button id="savePresetBtn" data-i18n="savePreset"></button>
      <button id="updatePresetBtn" data-i18n="updatePreset"></button>
      <button id="exportBtn" data-i18n="exportPreset"></button>
      <button id="importBtn" data-i18n="importPreset"></button>
    </div>
  </aside>

  <section class="panel builder">
    <div class="builder-top compact">
      <button class="builder-profile-btn" id="builderProfilesBtn">Персонажи</button>
      <div class="builder-mode-switch">
        <button class="active" data-builder-mode="fill" data-i18n="fillMode"></button>
        <button data-builder-mode="manual" data-i18n="manualMode"></button>
      </div>
    </div>

    <div class="fill-workspace" id="fillWorkspace">
      <div class="document-brief" id="documentBrief"></div>
      <div class="fill-fields" id="fillFields"></div>
      <div class="wording-actions" id="wordingActions"></div>
      <div class="phrase-hotbar" id="phraseHotbar"></div>
    </div>

    <div class="manual-workspace" id="manualWorkspace" hidden>
      <div class="manual-tools">
        <button id="addHeader">＋ <span data-i18n="headerBlock"></span></button>
        <button id="addText">＋ <span data-i18n="textBlock"></span></button>
        <button id="addDivider">＋ <span data-i18n="dividerBlock"></span></button>
        <button id="blockLibraryBtn">▦ <span>Блоки</span></button>
        <button id="resetBtn">↶ <span data-i18n="reset"></span></button>
      </div>
      <div class="blocks" id="blockList"></div>
      <div class="editor" id="editor"></div>
    </div>
  </section>

  <main class="panel preview">
    <div class="preview-bar">
      <div class="tabs">
        <button class="tab active" data-tab="preview" data-i18n="preview"></button>
        <button class="tab" data-tab="raw" data-i18n="raw"></button>
      </div>
      <div class="preview-zoom" title="Масштаб предпросмотра">
        <button id="zoomOut" aria-label="Уменьшить">−</button>
        <button id="zoomFit" data-i18n="fitPreview">По размеру</button>
        <button id="zoomValue" title="Сбросить до 105%">105%</button>
        <button id="zoomIn" aria-label="Увеличить">＋</button>
      </div>
    </div>
    <div class="preview-canvas">
      <div class="paper-stage" id="paperStage">
        <article class="paper" id="paper"></article>
        <button class="egg-character" id="eggCharacter" title="???" aria-label="Секретный персонаж">
          <img src="assets/eggchar.png" alt="">
        </button>
      </div>
      <div class="raw-box" id="rawBox" hidden>
        <div class="raw-head"><span>SS14 MARKUP</span><button id="copyRawBtn" data-i18n="copy"></button></div>
        <pre id="raw"></pre>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

о иерархии должностями. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ЗАЯВЛЕНИЕ О ТРУДОУСТРОЙСТВЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в текущей должности (полное наименование должности), прошу назначить меня сотрудником (название отдела трудоустройства) в должности (полное наименование должности). Обязуюсь следовать Стандартным Рабочим Процедурам отдела. Обязуюсь сдать рабочее снаряжение и экипировку отдела при переводе. ============================================= [italic]Место для печатей[/italic] заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен","keywordsRu":"заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен"},{"id":"wiki-12","group":"command","builtin":true,"name":{"ru":"Заявление об увольнении"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color]    [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|ПД-КОМ}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n[bold]ЗАЯВЛЕНИЕ ОБ УВОЛЬНЕНИИ[/bold]\n================= ние о медицинском вмешательстве Данный документ предназначен для принудительной установки импланта \"Трекер\" лицам, совершившим тяжкие и более правонарушения согласно процедуре об УДО. На основании данного распоряжения можно также произвести установку импланта защиты разума (\"Майндшильда\") при приёме на должностную профессию в случае необходимости. Также данный документ используется для принудительной проверки имплантов при наличии оснований, установленных процедурой обыска. Без наличия разрешения (печати) Главы Службы Безопасности или Капитана данный документ недействителен. Может быть использована для проведения процедуры временной остановки сердца владельцам голопаразитов, согласно процедуре СРП СБ. Может быть использована для принудительной вакцинации или психиатрического лечения. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 КОД-МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= РАСПОРЯЖЕНИЕ О МЕДИЦИНСКОМ ВМЕШАТЕЛЬСТВЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), распоряжаюсь провести медицинское вмешательство с целью (описание цели медицинского вмешательства), в отношении (ФИО) в должности (полное наименование должности). Основание для проведения операции: ============================================= [italic]Место для печатей[/italic]","keywordsRu":""},{"id":"wiki-40","group":"medical","builtin":true,"name":{"ru":"Запрос на проведение эвтаназии"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color]    [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|ПД-МЕД}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n[bold]ЗАПРОС НА ПРОВЕДЕНИЕ ЭВТАНАЗИИ[/bold]\n============================================="},{"id":"details-3","type":"details","labelRu":"Обязательные сведения","content":"Время от начала смены и дата: {{field:shift_time|время|}}\nСоставитель документа: {{field:author_name|ФИО|}}\nДолжность составителя: {{field:author_job|должность|}}\n"},{"id":"text-4","type":"text","labelRu":"Содержание документа","content":"Я, {{field:author_name|ФИО|(ФИО)}}, в должности {{field:author_job|должность|(полное наименование должности)}}, прошу содействие медицинского отдела в проведении эвтаназии в качестве врачебного лечения по причине {{field:reason|причина|(причина)}}. С последствиями данного решения ознакомлен, медицинским персоналом была установлена рациональность и гуманность данного решения. Претензий к медицинскому отделу при соблюдении ими протоколов эвтаназии не имею.\nПо окончании процедуры прошу утилизировать тело путём {{field:field_1|способ|(способ)}} при наличии на это возможности."},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n[italic]Место для печатей[/italic]"}]},"docType":"Запрос","descriptionRu":"Эвтаназия — практика прекращения жизни человека или другого живого существа, страдающего неизлечимым заболеванием и испытывающего вследствие этого заболевания невыносимые страдания.","searchRu":"Запрос на проведение эвтаназии Эвтаназия — практика прекращения жизни человека или другого живого существа, страдающего неизлечимым заболеванием и испытывающего вследствие этого заболевания невыносимые страдания. Для проведения эвтаназии необходимо произвести оценку здоровья пациента и установить его вменяемость при запросе на эвтаназию. Если пациент невменяем, стоит отправить его на психиатрическое лечение. Проведение эвтаназии без явных на то причин, а также проверки адекватности при запросе пациентом данной процедуры будет нести последствия по Корпоративному Закону. Боргизация является одним из способов утилизации тела и может быть указана в запросе. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ЗАПРОС НА ПРОВЕДЕНИЕ ЭВТАНАЗИИ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), прошу содействие медицинского отдела в проведении эвтаназии в качестве врачебного лечения по причине (указать причину запроса). С последствиями данного решения ознакомлен, медицинским персоналом была установлена рациональность и гуманность данного решения. Претензий к медицинскому отделу при соблюдении ими протоколов эвтаназии не имею. По окончании процедуры прошу утилизировать тело путём (способ утилизации) при наличии на это возможности. ============================================= [italic]Место для печатей[/italic] запрос запросить попросить центральное командование request","keywordsRu":"запрос запросить попросить центральное командование request"},{"id":"wiki-41","group":"medical","builtin":true,"name":{"ru":"Свидетельство о смерти"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]Nan eld:person_job_1|должность|(должность)}} в связи с невозможностью его реанимации и клонирования.\nСпособ утилизации: {{field:line_field_1|Способ утилизации|}}\n"},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n[italic]Место для печатей[/italic]"}]},"docType":"Разрешение","descriptionRu":"Может быть сделано только Главным Врачом или Капитаном.","searchRu":"Разрешение на утилизацию тела Может быть сделано только Главным Врачом или Капитаном. На данный момент любого пациента возможно клонировать в случае сохранения целостности тела, поэтому тело должно быть сохранено для его дальнейшей доставки на СЦК. Могут подлежать утилизации тела пациентов подвергшимся эвтаназии и казнённых лиц, а также в случае расчленения тела. В остальных случаях Главный Врач или Капитан самостоятельно принимает ответственность за разрешение утилизации тела на себя. Способами утилизации являются: кремация, космирование, переработка на биомассу, расчленение и последующая утилизация отдельных органов (в том числе боргизация мозга). Утилизация методом поедания тела умершего не рекомендуется из-за опасности данной процедуры, а также этической стороны данного действия, но такой вариант утилизации допустим. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= РАЗРЕШЕНИЕ НА УТИЛИЗАЦИЮ ТЕЛА ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), разрешаю утилизировать тело (ФИО), в должности (полное наименование должности) в связи с невозможностью его реанимации и клонирования. Способ утилизации: =================  все основные права разумных существ.","searchRu":"Приказ о признании разумности существа После написания данного документа на существо начинают действовать все основные права разумных существ. Полномочие на признание разумности существа имеют Научный руководитель и Капитан станции. Если есть возможность, стоит также привлечь психолога к тестированию психологического состояния существа и его вербальных способностей. Решение о возможности существа стать пассажиром станции принимает Капитан или ЦК, без его печати данный пункт не действителен. Если Капитан или ЦК приняли решение об отказе, то существо должно содержаться в бриге до конца смены согласно процедуре СБ. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 НИО[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ПРИКАЗ О ПРИЗНАНИИ РАЗУМНОСТИ СУЩЕСТВА ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: В ходе тестирования существа были выявлены признаки высшей мозговой деятельности и разумности данного существа, его способность мыслить, обучаться, понимание морали, наличие здравого смысла в поступках. Таким образом я, (ФИО), в должности (полное наименование должности), исходя из принципов равенства прав всех разумных существ, установленного ОПРС, признаю данное существо разумным. Внешний вид существа: Устанавливаемое полное имя существа: Существо принято/не принято в качестве пассажира станции до окончания смены. ============================================= [italic]Место для печатей[/italic] приказ распорядиться обязать распоряжение order","keywordsRu":"приказ распорядиться обязать распоряжение order"},{"id":"wiki-48","group":"science","builtin":true,"name":{"ru":"Запрос на проведение модернизац function departmentByAny(value){
 const normalized=String(value||"").trim().toUpperCase();
 return DEPARTMENTS.find(item=>[item.id,item.code,item.codeEn].map(x=>String(x||"").toUpperCase()).includes(normalized))||null;
}
function departmentCode(item,targetLang=lang){return targetLang==="en"?(item.codeEn||item.code):item.code}
function translateDepartmentRoute(route,targetLang=lang){
 return String(route||"").split("-").map(part=>{
  const value=part.trim();
  const item=departmentByAny(value);
  if(item)return departmentCode(item,targetLang);
  if(/^(КОД|CODE)$/i.test(value))return targetLang==="en"?"CODE":"КОД";
  return value;
 }).filter(Boolean).join("-");
}
function departmentName(value,targetLang=lang){const item=departmentByAny(value);return item?item[targetLang]:String(value||"")}
function jobEntries(department){const item=departmentByAny(department);return JOBS_BY_DEPARTMENT[item?.code||department]||[]}
function jobEntryByAny(department,value){const target=String(value||"");return jobEntries(department).find(item=>item.id===target||item.ru===target||item.en===target)||null}
function profileDepartmentLabel(profile,targetLang=lang){
 if(!profile)return "";
 return profile.departmentCustom||departmentName(profile.department,targetLang)||profile.department||"";
}
function profileJobLabel(profile,targetLang=lang){
 if(!profile)return "";
 if(profile.jobCustom)return profile.jobCustom;
 const entry=jobEntryByAny(profile.department,profile.jobId||profile.job);
 return entry?entry[targetLang]:(profile.job||"");
}

const MARKUP_FRAME_WIDTH=45;
const SS14_FONT_NORMAL='12px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_BOLD='bold 12px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_ITALIC='italic 12px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_BOLD_ITALIC='bold italic 12px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_HEAD_3='bold 14px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_HEAD_2='bold 17px "Noto Sans","Liberation Sans",Arial,sans-serif';
const SS14_FONT_HEAD_1='bold 24px "Noto Sans","Liberation Sans",Arial,sans-serif';
let markupMeasureContext=null;
function measureContext(){
 if(markupMeasureContext)return markupMeasureContext;
 if(typeof document==="undefined")return null;
 const canvas=document.createElement("canvas");
 markupMeasureContext=canvas.getContext("2d");
 return markupMeasureContext;
}
function visibleMarkupText(line){
 return String(line||"")
  .replace(/\{\{field:[^|}]+\|[^|}]*\|([^}]*)\}\}/g,"$1")
  .replace(/\[[^\]]+\]/g,"");
}
function visibleMarkupLength(line){return [...visibleMarkupText(line)].length}
function markupFontFor(tags){
 for(let i=tags.length-1;i>=0;i--){
  if(tags[i]==="head=1")return SS14_FONT_HEAD_1;
  if(tags[i]==="head=2")return SS14_FONT_HEAD_2;
  if(tags[i]==="head=3")return SS14_FONT_HEAD_3;
 }
 const bold=tags.includes("bold")||tags.includes("bolditalic");
 const italic=tags.includes("italic")||tags.includes("bolditalic");
 if(bold&&italic)return SS14_FONT_BOLD_ITALIC;
 if(bold)return SS14_FONT_BOLD;
 if(italic)return SS14_FONT_ITALIC;
 return SS14_FONT_NORMAL;
}
function measurePlainText(text,font=SS14_FONT_NORMAL){
 const ctx=measureContext();
 if(!ctx)return [...String(text||"")].length;
 ctx.font=font;
 return ctx.measureText(String(text||"")).width;
}
function measureMarkupText(line){
 const ctx=measureContext();
 if(!ctx)return visibleMarkupLength(line);
 const source=String(line||"").replace(/\{\{field:[^|}]+\|[^|}]*\|([^}]*)\}\}/g,"$1");
 const tags=[];let width=0,index=0;
 const rx=/\[(\/)?([a-z]+)(?:=([^\]]+))?\]/gi;let match;
 while((match=rx.exec(source))){
  const chunk=source.slice(index,match.index);
  if(chunk){ctx.font=markupFontFor(tags);width+=ctx.measureText(chunk).width}
  const closing=!!match[1],name=match[2].toLowerCase(),value=String(match[3]||"").toLowerCase();
  if(closing){
   if(name==="head"){const i=tags.map(tag=>tag.startsWith("head=")).lastIndexOf(true);if(i>=0)tags.splice(i,1)}
   else{const i=tags.lastIndexOf(name);if(i>=0)tags.splice(i,1)}
  }else if(name==="head")tags.push(`head=${value||"3"}`);
  else if(["bold","italic","bolditalic"].includes(name))tags.push(name);
  index=rx.lastIndex;
 }
 const tail=source.slice(index);
 if(tail){ctx.font=markupFontFor(tags);width+=ctx.measureText(tail).width}
 return width;
}
function centeredByPixels(content,frameWidthPx){
 const trimmed=String(content||"").trim();
 if(!trimmed||/^=+$/.test(trimmed))return trimmed;
 const contentWidth=measureMarkupText(trimmed);
 const spaceWidth=Math.max(.1,measurePlainText(" "));
 const pad=Math.max(0,Math.round((frameWidthPx-contentWidth)/2/spaceWidth));
 return " ".repeat(pad)+trimmed;
}
function centeredByColumns(content,width=MARKUP_FRAME_WIDTH){
 const trimmed=String(content||"").trim();
 if(!trimmed||/^=+$/.test(trimmed))return trimmed;
 const visibleWidth=visibleMarkupLength(trimmed);
 const pad=Math.max(0,Math.floor((width-visibleWidth)/2));
 return " ".repeat(pad)+trimmed;
}
function centerMarkupLine(line,width=MARKUP_FRAME_WIDTH){
 const trimmed=String(line||"").trim();
 if(!trimmed||/^=+$/.test(trimmed))return trimmed;
 return centeredByColumns(trimmed,width);
}
function centerFrameContent(text){
 const lines=String(text||"").replace(/\r\n?/g,"\n").split("\n");
 const width=lines.map(line=>line.trim()).find(line=>/^=+$/.test(line))?.length||MARKUP_FRAME_WIDTH;
 return lines.map(line=>centerMarkupLine(line,width)).join("\n").trimEnd();
}
function centerHeaderLine(line,width=MARKUP_FRAME_WIDTH){
 const source=String(line||"").trimEnd();
 const logoMatch=/^(.*?\[\/color\])(\s*)(.*)$/.exec(source);
 if(!logoMatch)return source;
 const [,logo,,restRaw]=logoMatch,rest=restRaw.trim();
 if(!rest)return logo;
 const frameWidthPx=measurePlainText("=".repeat(width));
 const logoWidth=measureMarkupText(logo);
 const restWidth=measureMarkupText(rest);
 const spaceWidth=Math.max(.1,measurePlainText(" "));
 const areaStartPx=Math.min(frameWidthPx,logoWidth+spaceWidth);
 const targetStartPx=areaStartPx+Math.max(0,(frameWidthPx-areaStartPx-restWidth)/2);
 const pad=Math.max(1,Math.round((targetStartPx-logoWidth)/spaceWidth));
 return logo+" ".repeat(pad)+rest;
}
function centerHeaderContent(text){
 const lines=String(text||"").replace(/\r\n?/g,"\n").split("\n");
 if(lines.some(line=>line.includes("#1d7a1d"))&&lines.some(line=>line.includes("#b8972d")))return text;
 if(!lines.some(line=>line.includes("Бланк документа"))||!lines.some(line=>line.includes("NanoTrasen")))return text;
 return lines.map(line=>centerHeaderLine(line)).join("\n").trimEnd();
}
function normalizeBlockContent(block){
 if(!block||typeof block.content!=="string")return block?.content;
 if(block.type==="title"||block.type==="stamp")return centerFrameContent(block.content);
 if(block.type==="header")return centerHeaderContent(block.content);
 return block.content;
}
function compileDocument(){
 return blocks().map(b=>resolveTokens(normalizeBlockContent(b))).join("\n");
}
function getFields(){
 const map=new Map();
 const rx=/\{\{field:([^|}]+)\|([^|}]*)\|([^}]*)\}\}/g;
 blocks().forEach(b=>{let m;while((m=rx.exec(b.content)))if(!map.has(m[1]))map.set(m[1],{key:m[1],label:m[2],fallback:m[3]})});
 return [...map.values()];
}
function getField(key){return getFields().find(f=>f.key===key)}
function fieldDisplayValue(field){
 const value=current.values[field.key];
 return value!==undefined&&String(value).trim()!==""?String(value):String(field.fallback||"");
}
function departmentCodeValue(){
 const f=getField("department_code");
 const raw=String(current.values.department_code||f?.fallback||(lang==="en"?"CODE-CODE":"КОД-КОД")).trim();
 return translateDepartmentRoute(raw,lang)||(lang==="en"?"CODE-CODE":"КОД-КОД");
}
function isRequired(field){return REQUIRED_KEYS.includes(field.key)}
function setPaperFieldState(el,value){
 if(!el?.classList?.contains("paper-field")||el.classList.contains("code-picker-field"))return;
 const filled=String(value||"").trim()!=="";
 el.classList.toggle("filled",filled);
 el.classList.toggle("placeholder",!filled);
}
function updateField(key,value){
 current.values[key]=value;
 saveState();

 document.querySelectorAll(
   `[data-quick-key="${CSS.escape(key)}"],`+
   `[data-fill-key="${CSS.escape(key)}"],`+
   `.paper-field[data-field-key="${CSS.escape(key)}"]`
 ).forEach(el=>{
   if(el.classList?.contains("paper-field"))setPaperFieldState(el,value);
   if(el===document.activeElement)return;
   if(el.matches('[contenteditable="true"]')){ if(el.textContent!==value)el.textContent=value; }
   else if("value" in el && el.value!==value)el.value=value;
 });

 document.getElementById("raw").textContent=compileDocument();
}
function tokenToSentinels(text){
 const fields=[];
 const source=String(text);
 const replaced=source.replace(/\{\{field:([^|}]+)\|([^|}]*)\|([^}]*)\}\}/g,(token,key,label,fallback,offset)=>{
  const n=fields.length;fields.push({key,label,fallback,placeholder:inlineFieldPlaceholder(source,offset,key,label,fallback)});return `@@FIELD_${n}@@`;
 });
 return {replaced,fields};
}
function compactFieldLabel(key,label,fallback=""){
 const raw=String(label||fallback||"").trim();
 const lower=raw.toLocaleLowerCase("ru");
 if(key==="station")return "станция";
 if(key==="department_code")return "код";
 if(key==="shift_time")return "время";
 if(/(?:^|_)name_\d$|_name$|^author_name$|^applicant_name$|^subject_name$/.test(key))return /объект|помещ|отдел|наименование/.test(lower)?"ФИО / объект":"ФИО";
 if(/(?:^|_)job_\d$|_job$|^author_job$|^applicant_job$|^subject_job$/.test(key))return "должность";
 if(/department/.test(key))return "отдел";
 if(/duration|deadline|validity|term|time|date/.test(key))return /мест/.test(lower)?"место и время":"срок";
 if(/reason|purpose|goal|cause/.test(key)||/причин|цель|основан/.test(lower))return /основан/.test(lower)?"основание":"причина";
 if(/evidence|proof|witness|violation|article/.test(key)||/доказ|улик|свидетел|наруш|стать/.test(lower))return /свидетел/.test(lower)?"свидетели":/стать|наруш/.test(lower)?"статьи":"доказательства";
 if(/count|quantity|number/.test(key)||/количеств|числ/.test(lower))return "число";
 if(/text|content|description|details|summary|notes|reporting/.test(key)||/опис|содерж|подроб|текст|замеч|отчит/.test(lower))return "описание";
 if(/task|criteria|result|outcome/.test(key)||/задач|критери|результ|решен/.test(lower))return /критери/.test(lower)?"критерии":/решен/.test(lower)?"решение":"результат";
 if(/access/.test(key)||/доступ/.test(lower))return "доступы";
 if(/equipment|item|product|supply/.test(key)||/снаряж|оборуд|предмет|товар|продукт/.test(lower))return "перечень";
 if(/shuttle|class/.test(key)||/шаттл|класс/.test(lower))return /класс/.test(lower)?"класс":"шаттл";
 if(/код|номер/.test(lower))return "код";
 if(/капитан|глава|старший/.test(lower))return "адресат";
 if(/должност/.test(lower))return "должность";
 if(/отдел/.test(lower))return "отдел";
 if(/фио/.test(lower))return "ФИО";
 return raw.length>26?"значение":raw;
}
function inlineFieldPlaceholder(source,offset,key,label,fallback){
 const before=source.slice(0,offset);
 const line=before.slice(before.lastIndexOf("\n")+1).replace(/\[[^\]]+\]/g,"").trim();
 if(key==="station")return "";
 if(/[:：]\s*$/.test(line))return "";
 return compactFieldLabel(key,label,fallback);
}
function renderInlineMarkup(value){
 let s=esc(value);
 s=s.replace(/\r\n?/g,"\n");
 s=s.replace(/\[color=([^\]]+)\]([\s\S]*?)\[\/color\]/gi,(match,color,content)=>{
  const safe=String(color||"").replace(/&quot;|["'`;<>]/g,"").trim();
  return safe?`<span style="color:${safe}">${content}</span>`:content;
 })
 .replace(/\[bolditalic\]([\s\S]*?)\[\/bolditalic\]/gi,"<strong><em>$1</em></strong>")
 .replace(/\[bold\]([\s\S]*?)\[\/bold\]/gi,"<strong>$1</strong>")
 .replace(/\[italic\]([\s\S]*?)\[\/italic\]/gi,"<em>$1</em>")
 .replace(/\[mono\]([\s\S]*?)\[\/mono\]/gi,"<code>$1</code>")
 .replace(/\[head=1\]([\s\S]*?)\[\/head\]/gi,"<strong>$1</strong>")
 .replace(/\[head=2\]([\s\S]*?)\[\/head\]/gi,"<strong>$1</strong>")
 .replace(/\[head=3\]([\s\S]*?)\[\/head\]/gi,"<strong>$1</strong>")
 .replace(/\[\/(?:italic|color|bold|mono|head)\]/gi,"")
 .replace(/\n/g,"<br>");
 return s;
}
function renderMarkup(text){
 const {replaced,fields}=tokenToSentinels(text);
 let s=esc(replaced);
 s=s.replace(/\[color=([^\]]+)\]([\s\S]*?)\[\/color\]/gi,'<span style="color:$1">$2</span>')
 .replace(/\[bolditalic\]([\s\S]*?)\[\/bolditalic\]/gi,"<strong><em>$1</em></strong>")
 .replace(/\[bold\]([\s\S]*?)\[\/bold\]/gi,"<strong>$1</strong>")
 .replace(/\[italic\]([\s\S]*?)\[\/italic\]/gi,"<em>$1</em>")
 .replace(/\[mono\]([\s\S]*?)\[\/mono\]/gi,"<code>$1</code>")
 .replace(/\[head=1\]([\s\S]*?)\[\/head\]/gi,"<h1>$1</h1>")
 .replace(/\[head=2\]([\s\S]*?)\[\/head\]/gi,"<h2>$1</h2>")
 .replace(/\[head=3\]([\s\S]*?)\[\/head\]/gi,"<h3>$1</h3>")
 .replace(/\[\/(?:italic|color|bold|mono|head)\]/gi,"");
 fields.forEach((f,i)=>{
   const val=current.values[f.key]??"";
   const required=isRequired(f);
   let input;
   if(f.key==="department_code"){
     const code=departmentCodeValue();
     input=`<button type="button" class="paper-field code-picker-field filled" data-field-key="department_code" data-department-picker title="${esc(t("departmentRoute"))}">${esc(code)}</button>`;
   }else{
     const filled=val!==undefined&&String(val).trim()!=="";
     const shown=String(filled?val:f.fallback||"");
     input=`<span role="textbox" contenteditable="true" spellcheck="false" class="paper-field ${filled?"filled":"placeholder"} ${required&&!shown.trim()?"missing":""}" data-field-key="${esc(f.key)}" data-placeholder="${esc(f.placeholder||f.label)}" title="${esc(f.label)}">${renderInlineMarkup(shown)}</span>`;
   }
   s=s.replace(`@@FIELD_${i}@@`,input);
 });
 return s;
}
function renderPreviewOnly(){
 const paper=document.getElementById("paper");
 paper.innerHTML=blocks().map(b=>{
   const editable=b.type==="title"||b.type==="text";
   const badge=editable?`<button type="button" class="copy-edit-badge" data-edit-copy="${esc(b.id)}">✎</button>`:"";
   return `<section class="paper-section ${esc(b.type)} ${editable?"editable-copy":""}" data-block-id="${esc(b.id)}">${badge}${renderMarkup(normalizeBlockContent(b))}</section>`;
 }).join("");

 const inputs=[...paper.querySelectorAll('[contenteditable="true"].paper-field')];
 inputs.forEach((input,index)=>{
   const key=input.dataset.fieldKey;
   const commit=()=>{
     const value=(input.textContent||"").replace(/\u00a0/g," ").trim();
     updateField(key,value);
     setPaperFieldState(input,value);
     input.classList.toggle("missing",isRequired(getField(key)||{})&&!value);
   };
   input.addEventListener("input",()=>{
     const value=(input.textContent||"").replace(/\u00a0/g," ");
     updateField(key,value);
     setPaperFieldState(input,value);
   });
   input.addEventListener("blur",commit);
   input.addEventListener("focus",()=>{
     const range=document.createRange(),selection=getSelection();
     range.selectNodeContents(input);selection.removeAllRanges();selection.addRange(range);
   });
   input.addEventListener("keydown",event=>{
     if(event.key!=="Enter"||event.shiftKey)return;
     event.preventDefault();commit();
     const next=inputs[index+1];
     if(next)next.focus();else input.blur();
   });
 });

 paper.querySelectorAll("[data-department-picker]").forEach(btn=>{
   btn.onclick=event=>{
     event.stopPropagation();
     openDepartmentPicker();
   };
 });

 paper.querySelectorAll(".editable-copy").forEach(section=>{
   section.onclick=event=>{
     if(event.target.closest(".paper-field"))return;
     editCopyBlock(section.dataset.blockId);
   };
 });

 document.getElementById("raw").textContent=compileDocument();
}

function normalizeSearch(value){
 return String(value||"").toLocaleLowerCase("ru").replace(/ё/g,"е").replace(/[^a-zа-я0-9]+/g," ").replace(/\s+/g," ").trim();
}
function expandedQuery(query){
 const base=normalizeSearch(query),tokens=base.split(" ").filter(Boolean);
 const extra=[];
 tokens.forEach(token=>{if(SEARCH_ALIASES[token])extra.push(SEARCH_ALIASES[token])});
 return normalizeSearch([base,...extra].join(" "));
}
function presetText(p){
 const content=(p.variants?.[lang]||p.variants?.ru||[]).map(b=>b.content).join(" ");
 const description=lang==="en"?(p.descriptionEn||""):(p.descriptionRu||"");
 return normalizeSearch([p.name?.[lang],description,p.searchRu,p.keywordsRu,content,GROUPS[p.group]?.[lang]].join(" "));
}
function presetKind(p){
 if(p.docType)return p.docType;
 const name=p.name?.ru||"";
 return ["Заявление","Разрешение","Отчёт","Приказ","Жалоба","Свидетельство","Запрос","Заказ","Решение","Заключение","Обращение"].find(x=>name.startsWith(x))||"Документ";
}
function searchScore(p,query){
 if(activeTypeFilter&&presetKind(p)!==activeTypeFilter)return -1;
 const q=expandedQuery(query);if(!q)return 1;
 const title=normalizeSearch(p.name?.[lang]||p.name?.ru||"");
 const desc=normalizeSearch(lang==="en"?(p.descriptionEn||""):(p.descriptionRu||""));
 const keywords=normalizeSearch(p.keywordsRu||"");
 const hay=presetText(p);let score=0;
 if(title===q)score+=500;if(title.includes(q))score+=180;if(desc.includes(q))score+=80;if(keywords.includes(q))score+=100;
 const tokens=q.split(" ").filter(x=>x.length>1);
 tokens.forEach(token=>{if(title.includes(token))score+=42;if(keywords.includes(token))score+=28;if(desc.includes(token))score+=18;if(hay.includes(token))score+=5});
 if(tokens.length&&tokens.every(token=>hay.includes(token)))score+=75;
 return score;
}

function renderCatalog(list,query){
 const groups={};
 allPresets().forEach(p=>{
  if(activeTypeFilter&&presetKind(p)!==activeTypeFilter)return;
  if(query&&searchScore(p,query)<=0)return;
  const g=p.builtin===false?"custom":p.group;
  (groups[g]||(groups[g]=[])).push(p);
 });
 const order=["custom","syndicate","basic","centcom","command","legal","security","medical","engineering","science","cargo","service","communications"];
 list.innerHTML=order.filter(g=>groups[g]?.length).map(g=>`<div class="smart-section">
  <div class="smart-section-head"><strong>${esc(GROUPS[g]?.ru||g)}</strong><span>${groups[g].length}</span></div>
  ${groups[g].map(p=>`<div class="catalog-row group-${esc(p.group||g||"custom")} ${currentPresetId===p.id?"active":""}" data-preset="${esc(p.id)}"><span class="catalog-index">${esc(formReference(p))}</span><span class="catalog-name">${customFormBadge(p)}${esc(displayPresetName(p))}</span><button class="fav-btn ${favoritePresetIds.includes(p.id)?"on":""}" data-favorite="${esc(p.id)}">${favoritePresetIds.includes(p.id)?"★":"☆"}</button></div>`).join("")}
 </div>`).join("")||`<div class="no-results">${esc(t("noSearchResults"))}</div>`;
 bindPresetCards(list);
}
function renderPresets(){
 const input=document.getElementById("presetSearch");
 const query=input.value.trim();
 const list=document.getElementById("presetList");
 document.getElementById("clearSearch").style.visibility=query?"visible":"hidden";
 if(finderMode==="browse"){renderCatalog(list,query);return}
 if(!query&&!activeTypeFilter){renderFindHome(list);return}
 const ranked=allPresets().map(p=>({p,score:searchScore(p,query)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||(a.p.name?.[lang]||a.p.name.ru).localeCompare(b.p.name?.[lang]||b.p.name.ru,lang==="ru"?"ru":"en")).slice(0,14);
 list.innerHTML=ranked.length?`<div class="smart-section"><div class="smart-section-head"><strong>${t("recommended")}</strong><span>${ranked.length}</span></div>${ranked.map(({p})=>resultCard(p,t("matchedBecause"))).join("")}</div>`:`<div class="no-results">${esc(t("noSearchResults"))}</div>`;
 bindPresetCards(list);
}

function fieldNeedsTextarea(field){
 return /(содержание|описание|причина|перечень|работ|мероприят|результат|обращени|нарушени|заключени|оборудован|снаряжен|доступ|состояни|детал|свидетел|подозреваем|потерпевш|присутствующ|участник|эксперт|content|details|reason|result|list|witness|suspect|victim|present_people|participant|expert)/i.test(field.label+" "+field.key);
}
function fieldGroup(field){
 return REQUIRED_KEYS.includes(field.key)?"main":"document";
}
function isParticipantField(field){return /(?:author|applicant|subject|person)_?(?:name|job)|recipient|responsible|giver|receiver/i.test(field.key)}
function fieldPresetFor(field){
 const text=normalizeSearch(field.label+" "+field.key);
 if(/причин.*доступ|reason.*access/.test(text))return null;
 let preset=FIELD_PRESETS.find(item=>(item.match||[]).some(match=>text.includes(normalizeSearch(match))));
 return preset||null;
}
function presetValuesForField(field){
 const preset=fieldPresetFor(field);if(!preset)return {preset:null,values:[]};
 let values=preset.values||[];
 const custom=(customFieldPresets[field.key]||[]).map(value=>({ru:value,en:value,custom:true}));
 return {preset,values:[...values,...custom]};
}
function clauseTagsForCurrent(){
 const preset=currentPreset();const text=normalizeSearch(`${preset?.name?.ru||""} ${preset?.docType||""}`);const tags=["general"];
 if(/разреш|доступ/.test(text))tags.push("permit","access");
 if(/снаряж|оруж/.test(text))tags.push("equipment");
 if(/трудоустр|увольн|повыш/.test(text))tags.push("employment");
 if(/жалоб|расслед|правонаруш|обыск|суд/.test(text))tags.push("investigation","complaint");
 if(/медицин|здоров|эвтаназ|смерт|тела/.test(text))tags.push("medical");
 if(/отч[её]т/.test(text))tags.push("report");
 return [...new Set(tags)];
}
function suggestedClauses(limit=5){const tags=clauseTagsForCurrent();return STANDARD_CLAUSES.filter(item=>(item.tags||["general"]).some(tag=>tags.includes(tag))).slice(0,limit)}

function availableDocumentRoles(){
 const fields=getFields(),byKey=Object.fromEntries(fields.map(f=>[f.key,f]));
 const roles=[];
 const add=(id,label,nameKey,jobKey,departmentKey="")=>{if(byKey[nameKey]||byKey[jobKey])roles.push({id,label,nameKey:byKey[nameKey]?nameKey:"",jobKey:byKey[jobKey]?jobKey:"",departmentKey:departmentKey&&byKey[departmentKey]?departmentKey:""})};
 add("author","Составитель","author_name","author_job");
 add("applicant","Заявитель","applicant_name","applicant_job");
 add("subject",(/подозрев|арест|обыск/.test(normalizeSearch(current.name?.ru||""))?"Подозреваемый":"Участник"),"subject_name","subject_job");
 for(let i=1;i<=4;i++){const n=`person_name_${i}`,j=`person_job_${i}`;if(byKey[n]||byKey[j])add(`person${i}`,byKey[n]?.label||`Участник ${i}`,n,j)}
 [["recipient","Получатель"],["responsible","Ответственное лицо"],["giver","Передающая сторона"],["receiver","Получающая сторона"]].forEach(([key,label])=>{if(byKey[key])roles.push({id:key,label,nameKey:key,jobKey:"",departmentKey:""})});

function titleLineInfo(content){

 return {lines,index,raw,leading,value,bold:!!bold,head:head?head[0].match(/\[head=\d\]/i)?.[0]:null};
}

function fieldifyImported(text,values){

 let out=text;defs.forEach(([rx,key,label])=>{const m=out.match(rx);if(m){values[key]=(m[2]||"").trim();out=out.replace(rx,`${m[1]}: {{field:${key}|${label}|}}`)}});return out;
}
function parseImportedDocument(raw){
 const text=String(raw||"").replace(/\r\n?/g,"\n").trim();const values={};if(!text)return {blocks:[],values};
 const lines=text.split("\n"),dividers=[];lines.forEach((line,i)=>{if(/^\s*={8,}\s*$/.test(line))dividers.push(i)});let result=[];
 if(dividers.length>=2){const first=dividers[0],second=dividers[1];const before=lines.slice(0,first).join("\n").trim();const title=lines.slice(first,second+1).join("\n").trim();let rest=lines.slice(second+1).join("\n").trim();if(before)result.push({id:uid("header"),type:"header",labelRu:"Импортированная шапка",content:fieldifyImported(before,values)});if(title)result.push({id:uid("title"),type:"title",labelRu:"Название документа",content:title});if(rest){const last=rest.lastIndexOf("=============================================");if(last>0&&/печати/i.test(rest.slice(last))){const body=rest.slice(0,last).trim(),stamp=rest.slice(last).trim();if(body)result.push({id:uid("text"),type:"text",labelRu:"Содержание документа",content:fieldifyImported(body,values)});result.push({id:uid("stamp"),type:"stamp",labelRu:"Место для печатей",content:stamp})}else result.push({id:uid("text"),type:"text",labelRu:"Содержание документа",content:fieldifyImported(rest,values)})}
 }else result=[{id:uid("text"),type:"text",labelRu:"Импортированный документ",content:fieldifyImported(text,values)}];return {blocks:result,values};
}

// Application-level undo/redo. Snapshots cover fields, blocks, selected document and editor mode.
const historyLimit=60;
let historyEntries=[],historyIndex=-1,historyRestoring=false;
function historySnapshot(){return {current:clone(current),currentPresetId,selectedBlockId,builderMode,currentTab}}
function historyKey(snapshot){return JSON.stringify(snapshot)}
function recordHistory(){
 if(historyRestoring||!current)return;
 const snapshot=historySnapshot(),key=historyKey(snapshot);
 if(historyIndex>=0&&historyEntries[historyIndex]?.key===key){updateHistoryButtons();return}
 historyEntries=historyEntries.slice(0,historyIndex+1);
 historyEntries.push({key,snapshot});
 if(historyEntries.length>historyLimit)historyEntries.shift();
 historyIndex=historyEntries.length-1;updateHistoryButtons();
}
function resetHistory(){historyEntries=[];historyIndex=-1;recordHistory()}
function restoreHistory(index){
 if(index<0||index>=historyEntries.length)return;
 historyRestoring=true;
 const snapshot=clone(historyEntries[index].snapshot);
 current=snapshot.current;currentPresetId=snapshot.currentPresetId;selectedBlockId=snapshot.selectedBlockId;
 builderMode=snapshot.builderMode||"fill";currentTab=snapshot.currentTab||"preview";historyIndex=index;
 localStorage.setItem("ss14-last-draft",JSON.stringify(draftSnapshot("","autosave")));
 renderAll();updateDraftIndicator();historyRestoring=false;updateHistoryButtons();
}
function undoChange(){if(historyIndex>0)restoreHistory(historyIndex-1)}
function redoChange(){if(historyIndex<historyEntries.length-1)restoreHistory(historyIndex+1)}
function updateHistoryButtons(){
 const undo=document.getElementById("undoBtn"),redo=document.getElementById("redoBtn");
 if(undo)undo.disabled=historyIndex<=0;if(redo)redo.disabled=historyIndex<0||historyIndex>=historyEntries.length-1;
}

let lastKeyClick=0,keyClickIndex=0;
const keyClickSounds=Array.from({length:5},()=>{const audio=new Audio("assets/key.mp3");audio.preload="auto";audio.volume=.34;return audio});
function keySoundTarget(target){
 return target&&(["INPUT","TEXTAREA"].includes(target.tagName)||target.isContentEditable)&&target.tagName!=="SELECT";
}
function shouldPlayKeySound(event){
 if(!keySoundsEnabled||event.ctrlKey||event.metaKey||event.altKey||event.repeat)return false;
 if(!keySoundTarget(event.target))return false;
 return event.key.length===1||["Backspace","Delete","Enter","Tab"," "].includes(event.key);
}
function playRetroKeyClick(event){
 if(!shouldPlayKeySound(event))return;
 const now=performance.now();if(now-lastKeyClick<18)return;lastKeyClick=now;
 try{
  const audio=keyClickSounds[keyClickIndex++%keyClickSounds.length];
  audio.pause();audio.currentTime=0;
  const baseVolume=event.key==="Enter"?.38:.28;
  audio.volume=baseVolume+Math.random()*.12;
  audio.playbackRate=.55+Math.random()*.95;
  audio.play().catch(()=>{});
 }catch{}
}

const STANDARD_NT_HEADER="[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color] [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|КОД-КОД}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]";
function repairTruncatedNtHeaders(){
 const normalizeHeader=text=>String(text||"").replace(/\[color=#1b487e\]░░░░██░░██░██░██░\[\/color\] \[bold\]Объект NT: \{\{field:station\|([^|}]*)\|([^}]*)\}\}\[\/bold\]\n\[color=#1b487e\]░░░░██░░░████░███\[\/color\] \[bold\]Кодификация: \{\{field:department_code\|([^|}]*)\|([^}]*)\}\}\[\/bold\]/g,(_,stationLabel,stationFallback,codeLabel,codeFallback)=>`[color=#1b487e]░░░░██░░██░██░██░[/color] [bold]{{field:station|станция|${stationFallback}}} {{field:department_code|код|${codeFallback}}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]`);
 const repairBlocks=list=>{
   if(!Array.isArray(list))return false;let changed=false;
   for(const block of list){
     if(!block)continue;
     if(block.type!=="header")continue;
     const text=String(block.content||"");
     const normalized=normalizeHeader(text);
     if(normalized!==text){block.content=normalized;changed=true;}
     const currentText=String(block.content||"");
     const isBlueNt=currentText.includes("#1b487e")&&currentText.includes("Бланк документа");
     const truncated=isBlueNt&&(!currentText.includes("NanoTrasen")||currentText.split(/\n/).length<5);
     if(truncated){block.content=STANDARD_NT_HEADER;changed=true;}
     const centered=centerHeaderContent(block.content);
     if(centered!==block.content){block.content=centered;changed=true;}
   }
   return changed;
 };
 let changed=false;
 const collections=[BUILTIN_PRESETS,customTemplates,customPresets];
 for(const collection of collections){
   for(const preset of collection||[]){
     for(const variant of Object.values(preset?.variants||{}))changed=repairBlocks(variant)||changed;
   }
 }
 for(const variant of Object.values(current?.variants||{}))changed=repairBlocks(variant)||changed;
 if(changed)saveState();
 return changed;
}

илизаторы являются низшими по иерархии должностями. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ЗАЯВЛЕНИЕ О ТРУДОУСТРОЙСТВЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в текущей должности (полное наименование должности), прошу назначить меня сотрудником (название отдела трудоустройства) в должности (полное наименование должности). Обязуюсь следовать Стандартным Рабочим Процедурам отдела. Обязуюсь сдать рабочее снаряжение и экипировку отдела при переводе. ============================================= [italic]Место для печатей[/italic] заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен","keywordsRu":"заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен"},{"id":"wiki-12","group":"command","builtin":true,"name":{"ru":"Заявление об увольнении"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color]    [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|ПД-КОМ}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n[bold]ЗАЯВЛЕНИЕ ОБ УВОЛЬНЕН ью официального обращения к какому-либо должностному лицу или сотруднику со свободным содержанием.","searchRu":"Обращение Пишется лицом с целью официального обращения к какому-либо должностному лицу или сотруднику со свободным содержанием. Может содержать какую-либо просьбу, совет или жалобу в официальном или полу-официальном формате. В целом в данной форме можно написать что-либо, что вы обычно запрашиваете при получении иных форм. Например обращение о регистрации брака, разрешении на оружие, на доступы или передвижение и т.п. Обращения могут быть направлены и в Центральное Командование, в таком случае код обращения будет ПД-ЦК. Также по данной форме пишется обращение к Магистрату с целью урегулирования ситуации, в таком случае код обращения будет ПД-ЮР, обращение осуществляется по соответствующей процедуре. Примеры ситуаций: Возникновение ситуации, при которой Корпоративный Закон не способен защитить ущемление ОПРС какого-либо лица. Необходимость оспорить приговор, вынесенный Капитаном. Необходимость отстранить от работы Агента Внутренних Дел при нарушении им ОПРС, КЗ или СРП. Необходимость проведения судебной процедуры. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ОБРАЩЕНИЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), прошу рассмотреть (ФИО), в должности (полное наименование должности) моё обращение. Содержание обращения: Причины его написания: ============================================= [italic]Место для печатей[/italic] обращение просьба вопрос свободная форма универсальная просьба свободный документ брак оружие доступ ния им каких-либо жизненно важных работ. Выдать такое разрешение парамедику, чтобы он мог продолжать оказывать медицинскую помощь, либо инженеру для починки света - хорошая идея, музыканту с целью развлечения всех игрой на барабанах - не очень. Без такого разрешения сотрудник может быть только в своём отделе, либо в столовой/баре, библиотеке или в уборных. Нахождение вне данных мест влечёт за собой арест по статье \"Сопротивление органам власти\" корпоративного закона согласно общим СРП кодов экипажа. Данный документ не даёт право на нахождение в отсеках, к которым не давали доступ сотруднику. Если он там находится, его можно привлечь за проникновение. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= РАЗРЕШЕНИЕ НА ПЕРЕДВИЖЕНИЕ ПРИ УГРОЗЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), разрешаю сотруднику (ФИО) в должности (полное наименование должности) передвижение по станции с целью выполнения им рабочих обязанностей. Уровни кодов угроз, при которых даётся данное разрешение: Разрешенные части станции для местонахождения сотрудника (можно указать всю станцию): ============================================= [italic]Место для печатей[/italic] разрешение разрешить можно допуск permit право использование носить ходить по станции красный код фиолетовый гамма передвижение","keywordsRu":"разрешение разрешить можно допуск permit право использование носить ходить по станции красный код фиолетовый гамма передвижение"},{"id":"wiki-18","group":"command","builtin":true,"name":{"ru":"Приказ о поощрении"},"variants":{"ru":[{"id":"header-1","type":"he атьи Корпоративного Закона:\n{{field:field_3|статьи|(статьи)}}\nС учетом всех смягчающих и отягчающих обстоятельств, правовое наказание данного лица представлено в виде:\n{{field:field_4|приговор|(приговор)}}\nАдминистративное наказание: {{field:field_5|административное наказание|(административное наказание)}}\nСрок заключения под стражу отсчитывается с: {{field:field_6|время начала заключения|(время начала заключения)}}"},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n[italic]Место для печатей[/italic]"}]},"docType":"Решение","descriptionRu":"Приговор составляется в процессе вынесения вердикта по делу правонарушителя Смотрителем, Главой Службы Безопасности или Капитаном.","searchRu":"Приговор Приговор составляется в процессе вынесения вердикта по делу правонарушителя Смотрителем, Главой Службы Безопасности или Капитаном. Смертная казнь может быть исполнена только при наличии разрешения Капитана или ЦК (на приговоре должна стоять их печать). До их разрешения приговор к смертной казни считается недействительным. Административное наказание по средним и тяжким статьям выносится на усмотрение Главы отдела, к которому принадлежит правонарушитель (на приговор ставиться его печать). Сверхтяжкие и критические нарушения несут за собой обязательное принудительное увольнение, в таком случае ID карта правонарушителя изымается для понижения всех доступов на основании данного документа. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 СБ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ПРИГОВОР ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное название должности), выношу приговор согласно данным мне полномочиям в отношении (ФИО), в должности (полное название должности). Данное лицо нарушило следующие статьи Корпоративного Закона: (перечисление статей) С учетом всех смягчающих и отягчающих обстоятельств, правовое наказание данного лица представлено в виде: (суммарный срок, пожизненно заключение, либо приговор к казни) Административное наказание: (понижение в должности, увольнение) Срок заключения под стражу отсчитывается с: (время начала заключения) ============================================= [italic]Место для печатей[/italic] решение суд приговор постановление","keywordsRu":"решение суд приговор постановление"},{"id":"wiki-30","group":"security","builtin":true,"name":{"ru":"Свидетельство о правонарушении"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color]    [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|ПД-СБ}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n[bold]СВИДЕТЕЛЬСТВО О ПРАВОНАРУШЕНИИ[/bold]\n============================================="},{"id":"details-3","type":"details","labelRu":"Обязательные сведения","content":"Время от начала смены и дата: {{field:shift_time|время|}}\nСоставитель документа: {{field:author_name|ФИО|}}\nДолжность составителя: {{field:author_job|должность|}}\n"},{"id":"text-4","type":"text","labelRu":"Содержание документа","content":"Я, {{field:author_name|ФИО|(ФИО)}}, в должности {{field:author_job|должность|(полное наименование должности)}}, свидетельствую о правонарушениях/самолично признаюсь в совершении правонарушений, предусмотренных статьями:\n{{field:fie  УДО.","searchRu":"Распоряжение о медицинском вмешательстве Данный документ предназначен для принудительной установки импланта \"Трекер\" лицам, совершившим тяжкие и более правонарушения согласно процедуре об УДО. На основании данного распоряжения можно также произвести установку импланта защиты разума (\"Майндшильда\") при приёме на должностную профессию в случае необходимости. Также данный документ используется для принудительной проверки имплантов при наличии оснований, установленных процедурой обыска. Без наличия разрешения (печати) Главы Службы Безопасности или Капитана данный документ недействителен. Может быть использована для проведения процедуры временной остановки сердца владельцам голопаразитов, согласно процедуре СРП СБ. Может быть использована для принудительной вакцинации или психиатрического лечения. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 КОД-МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= РАСПОРЯЖЕНИЕ О МЕДИЦИНСКОМ ВМЕШАТЕЛЬСТВЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), распоряжаюсь провести медицинское вмешательство с целью (описание цели медицинского вмешательства), в отношении (ФИО) в должности (полное наименование должности). Основание для проведения операции: ============================================= [italic]Место для печатей[/italic]","keywordsRu":""},{"id":"wiki-40","group":"medical","builtin":true,"name":{"ru":"Запрос на проведение эвтаназии"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]         [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color]    [bold]{{field:station|станция|Station XX-000}} {{field:department_code|код|ПД-МЕД}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n[bold]ЗАПРОС НА ПРОВЕДЕНИЕ ЭВТАНАЗИИ[/bold]\n============================================="},{"id":"details-3","type":"details","labelRu":"Обязательные сведения","content":"Время от начала смены и дата: {{field:shift_time|время|}}\nСоставитель документа: {{field:author_name|ФИО|}}\nДолжность составителя: {{field:author_job|должность|}}\n"},{"id":"text-4","type":"text","labelRu":"Содержание документа","content":"Я, {{field:author_name|ФИО|(ФИО)}}, в должности {{field:author_job|должность|(полное наименование должности)}}, прошу содействие медицинского отдела в проведении эвтаназии в качестве врачебного лечения по причине {{field:reason|причина|(причина)}}. С последствиями данного решения ознакомлен, медицинским персоналом была установлена рациональность и гуманность данного решения. Претензий к медицинскому отделу при соблюдении ими протоколов эвтаназии не имею.\nПо окончании процедуры прошу утилизировать тело путём {{field:field_1|способ|(способ)}} при наличии на это возможности."},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n[italic]Место для печатей[/italic]"}]},"docType":"Запрос","descriptionRu":"Эвтаназия — практика прекращения жизни человека или другого живого существа, страдающего неизлечимым заболеванием и испытывающего вследствие этого заболевания невыносимые страдания.","searchRu":"Запрос на проведение эвтаназии Эвтаназия — практика прекращения жизни человека или другого живого существа, страдающего неизлечимым заболеванием и испытывающего вследствие этого заболевания невыносимые страдания. Для проведения эвтаназии необходимо произвести оценку здоровья пациента и установить его вменяемость при запросе на эвтаназию. Если пациент невменяем, стоит отправить его на психиатрическое лечение. Проведение эвтаназии без явных на то причин, а также проверки адекватности при запросе пациентом данной процедуры будет нести последствия по Корпоративному Закону. Боргизация является одним из способов утилизации тела и может быть указана в запросе. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ЗАПРОС НА ПРОВЕДЕНИЕ ЭВТАНАЗИИ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), прошу содействие медицинского отдела в проведении эвтаназии в качестве врачебного лечения по причине (указать причину запроса). С последствиями данного решения ознакомлен, медицинским персоналом была установлена рациональность и гуманность данного решения. Претензий к медицинскому отделу при соблюдении ими протоколов эвтаназии не имею. По окончании процедуры прошу утилизировать тело путём (способ утилизации) при наличии на это возможности. ============================================= [italic]Место для печатей[/italic] запрос запросить попросить центральное командование request","keywordsRu":"запрос запросить попросить центральное командование request"},{"id":"wiki-41","group":"medical","builtin":true,"name":{"ru":"Свидетельство о смерти"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]       [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░ ИО|(ФИО)}}, в должности {{field:person_job_1|должность|(должность)}} в связи с невозможностью его реанимации и клонирования.\nСпособ утилизации: {{field:line_field_1|Способ утилизации|}}\n"},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n[italic]Место для печатей[/italic]"}]},"docType":"Разрешение","descriptionRu":"Может быть сделано только Главным Врачом или Капитаном.","searchRu":"Разрешение на утилизацию тела Может быть сделано только Главным Врачом или Капитаном. На данный момент любого пациента возможно клонировать в случае сохранения целостности тела, поэтому тело должно быть сохранено для его дальнейшей доставки на СЦК. Могут подлежать утилизации тела пациентов подвергшимся эвтаназии и казнённых лиц, а также в случае расчленения тела. В остальных случаях Главный Врач или Капитан самостоятельно принимает ответственность за разрешение утилизации тела на себя. Способами утилизации являются: кремация, космирование, переработка на биомассу, расчленение и последующая утилизация отдельных органов (в том числе боргизация мозга). Утилизация методом поедания тела умершего не рекомендуется из-за опасности данной процедуры, а также этической стороны данного действия, но такой вариант утилизации допустим. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 МЕД[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= РАЗРЕШЕНИЕ НА УТИЛИЗАЦИЮ ТЕЛА ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), разрешаю утилизировать тело (ФИО), в должности (полное наименование должности) в связи с невозможностью его реанимации и клонирования. Способ у ущество начинают действовать все основные права разумных существ.","searchRu":"Приказ о признании разумности существа После написания данного документа на существо начинают действовать все основные права разумных существ. Полномочие на признание разумности существа имеют Научный руководитель и Капитан станции. Если есть возможность, стоит также привлечь психолога к тестированию психологического состояния существа и его вербальных способностей. Решение о возможности существа стать пассажиром станции принимает Капитан или ЦК, без его печати данный пункт не действителен. Если Капитан или ЦК приняли решение об отказе, то существо должно содержаться в бриге до конца смены согласно процедуре СБ. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 НИО[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ПРИКАЗ О ПРИЗНАНИИ РАЗУМНОСТИ СУЩЕСТВА ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: В ходе тестирования существа были выявлены признаки высшей мозговой деятельности и разумности данного существа, его способность мыслить, обучаться, понимание морали, наличие здравого смысла в поступках. Таким образом я, (ФИО), в должности (полное наименование должности), исходя из принципов равенства прав всех разумных существ, установленного ОПРС, признаю данное существо разумным. Внешний вид существа: Устанавливаемое полное имя существа: Существо принято/не принято в качестве пассажира станции до окончания смены. ============================================= [italic]Место для печатей[/italic] приказ распорядиться обязать распоряжение order","keywordsRu":"приказ распорядиться обязать распоряжение order"},{"id":"wiki-48","group":"science","builtin":true,"name":{"ru":"Зап loadExternalData=async function(){
  BUILTIN_PRESETS=clone(EMBEDDED_FORM_DATA.presets||[]);
  const load=async(path)=>{const response=await fetch(path,{cache:"no-store"});if(!response.ok)throw new Error(path);return response.json()};
  const results=await Promise.allSettled([load("./data/departments.json"),load("./data/jobs.json"),load("./data/clauses.json"),load("./data/field-presets.json")]);
  const [departments,jobs,clauses,presets]=results.map(item=>item.status==="fulfilled"?item.value:null);
  if(Array.isArray(departments?.departments))DEPARTMENTS=departments.departments;
  if(jobs&&typeof jobs.jobs==="object")JOBS_BY_DEPARTMENT=jobs.jobs;
  if(Array.isArray(clauses?.clauses))STANDARD_CLAUSES=clauses.clauses;
  if(Array.isArray(presets?.presets))FIELD_PRESETS=presets.presets;
  customClauses=readJSON("ss14-custom-clauses",customClauses);
  customFieldPresets=readJSON("ss14-custom-field-presets",customFieldPresets);
  customTemplates=readJSON("ss14-custom-templates",customTemplates);
  customBlockPresets=readJSON("ss14-custom-block-presets",customBlockPresets);
  return true;
};

function roleFieldExists(key){return getFields().some(field=>field.key===key)}
function roleLabelFromField(key,fallback){return getFields().find(field=>field.key===key)?.label||fallback}
function escapeRegExp(value){return String(value).replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
function stripMarkupLabel(value){
 return String(value||"")
  .replace(/\{\{field:[^}]+\}\}/g,"")
  .replace(/\[[^\]]+\]/g,"")
  .replace(/^[\s:;,.—-]+|[\s:;,.—-]+$/g,"")
  .replace(/\s+/g," ")
  .trim();
}
function fieldContextLabel(key){
 const token=new RegExp(`\\{\\{field:${escapeRegExp(key)}\\|[^}]+\\}\\}`);
 for(const block of blocks()){
  const content=String(block.content||""),match=token.exec(content);if(!match)continue;
  const before=content.slice(0,match.index),lines=before.split(/\n/);
  const candidates=[];
  const sameLine=lines[lines.length-1]||"";
  if(/[:：]\s*(?:\[[^\]]+\]\s*)*$/.test(sameLine))candidates.push(sameLine);
  for(let i=lines.length-2;i>=Math.max(0,lines.length-4);i--){
   const line=lines[i]||"";
   if(!stripMarkupLabel(line))continue;
   if(/[:：]\s*(?:\[[^\]]+\]\s*)*$/.test(line))candidates.push(line);
   break;
  }
  for(const candidate of candidates){
   const parts=candidate.split(/[:：]/),label=stripMarkupLabel(parts.length>1?parts.slice(0,-1).join(":"):candidate);
   if(label&&!/^(я|и|в|на|по|от|для)$/i.test(label))return label;
  }
 }
 return "";
}
function conciseRoleLabel(label,key,fallback){
 const raw=stripMarkupLabel(label)||stripMarkupLabel(fallback)||"";
 const lower=normalizeSearch(raw);
 if(!raw||/^(фио|должность|имя|значение|описание|перечень)$/i.test(raw))return fallback;
 if(/составител/.test(lower))return "Составитель";
 if(/заявител/.test(lower))return "Заявитель";
 if(/допрошенн/.test(lower))return "Допрошенные лица";
 if(/присутствующ/.test(lower))return "Присутствующие";
 if(/свидетел/.test(lower)&&key==="subject_name")return "Свидетель";
 if(/допрашиваем/.test(lower))return "Допрашиваемое лицо";
 if(/проверяем.*(лицо|сотрудник)|основн.*проверяем/.test(lower))return "Проверяемое лицо";
 if(/проверяем.*отдел|ответственн.*лицо/.test(lower))return "Проверяемый отдел / лицо";
 if(/приговор/.test(lower))return "Осуждённый";
 if(/арест|заключенн|под страж/.test(lower))return "Арестуемый";
 if(/обыск|объект.*обыск/.test(lower))return "Объект обыска";
 if(/назначить сотрудник|временно исполня/.test(lower))return "Назначаемый";
 if(/уволить сотрудник/.test(lower))return "Увольняемый";
 if(/лишить сотрудник|разрешаю сотруднику|сотрудник/.test(lower))return "Сотрудник";
 if(/пациент/.test(lower))return "Пациент";
 if(/брак/.test(lower))return "Супруг";
 if(/подозреваем/.test(lower))return "Подозреваемые";
 if(/потерпевш/.test(lower))return "Потерпевшие";
 if(/эксперт/.test(lower))return "Эксперты";
 if(/получател/.test(lower))return "Получатель";
 if(/передающ/.test(lower))return "Передающая сторона";
 if(/получающ/.test(lower))return "Получающая сторона";
 if(/ответственн/.test(lower))return "Ответственный";
 return raw.length>32?fallback:raw;
}
function roleLabelFor(key,fallback){
 return conciseRoleLabel(fieldContextLabel(key)||roleLabelFromField(key,fallback),key,fallback);
}
function pairedRoleLabel(nameKey,jobKey,fallback){
 return roleLabelFor(nameKey,roleLabelFor(jobKey,fallback));
}
function subjectRoleFallback(title){
 if(/обыск/.test(title))return "Объект обыска";
 if(/арест/.test(title))return "Арестуемый";
 if(/назначен|врио|цели станции/.test(title))return "Ответственный";
 if(/свидетел/.test(title))return "Свидетель";
 if(/допрос/.test(title))return "Допрашиваемое лицо";
 if(/приговор/.test(title))return "Осуждённый";
 if(/жалоб|расслед|наруш/.test(title))return "Проверяемое лицо";
 return "Участник";
}
function personRoleFallback(key,index,title){
 if(/брак|супруг/.test(title))return /person_name_[34]/.test(key)?"Новый супруг":"Супруг";
 if(/устранени.*наруш/.test(title))return "Нарушитель";
 if(/^обращение$/.test(title))return "Адресат";
 if(/увольн/.test(title))return "Увольняемый";
 if(/лишени.*доступ/.test(title))return "Сотрудник";
 if(/передвижени|квалификац|снаряжен|трудоустр|повышен|зарплат/.test(title))return "Сотрудник";
 if(/поощрен|наград/.test(title))return "Награждаемый";
 if(/внутреннем расслед/.test(title))return "Заявитель";
 if(/приговор/.test(title))return "Осуждённый";
 if(/обвинител/.test(title))return "Обвиняемый";
 if(/судеб|правонаруш/.test(title))return "Фигурант дела";
 if(/арест|удо|заключенн/.test(title))return "Арестуемый";
 if(/обыск/.test(title))return "Объект обыска";
 if(/оруж/.test(title))return "Владелец оружия";
 if(/препарат|медицинск/.test(title))return "Пациент";
 if(/тела/.test(title))return "Тело";
 if(/строительств/.test(title))return "Исполнитель";
 return `Участник ${index}`;
}
availableDocumentRoles=function(){
 const fields=getFields(),byKey=Object.fromEntries(fields.map(f=>[f.key,f])),roles=[];
 const addPair=(id,label,nameKey,jobKey,departmentKey="")=>{if(byKey[nameKey]||byKey[jobKey])roles.push({id,label,mode:"pair",nameKey:byKey[nameKey]?nameKey:"",jobKey:byKey[jobKey]?jobKey:"",departmentKey:departmentKey&&byKey[departmentKey]?departmentKey:""})};
 const addList=(id,label,key)=>{if(byKey[key])roles.push({id,label,mode:"append",listKey:key})};
 addPair("author",pairedRoleLabel("author_name","author_job","Составитель"),"author_name","author_job","author_department");
 addPair("applicant",pairedRoleLabel("applicant_name","applicant_job","Заявитель"),"applicant_name","applicant_job","applicant_department");
 const title=normalizeSearch(current.name?.ru||"");
 addPair("subject",pairedRoleLabel("subject_name","subject_job",subjectRoleFallback(title)),"subject_name","subject_job","subject_department");
 for(let i=1;i<=6;i++){const n=`person_name_${i}`,j=`person_job_${i}`;if(byKey[n])addPair(`person${i}`,pairedRoleLabel(n,j,personRoleFallback(n,i,title)),n,j)}
 addList("suspects",roleLabelFor("suspects","Подозреваемые"),"suspects");
 addList("victims",roleLabelFor("victims","Потерпевшие"),"victims");
 addList("witnesses",roleLabelFor("witnesses","Свидетели"),"witnesses");
 addList("experts",roleLabelFor("experts","Эксперты"),"experts");
 addList("present_people",roleLabelFor("present_people","Присутствующие"),"present_people");
 [["recipient","Получатель"],["responsible","Ответственное лицо"],["giver","Передающая сторона"],["receiver","Получающая сторона"]].forEach(([key,label])=>{if(byKey[key])roles.push({id:key,label:roleLabelFor(key,label),mode:"single",nameKey:key})});
 return roles;
};

profileRoleMap=function(profile,role){
 if(role.mode==="append")return {};
 const out={};if(role.nameKey)out[role.nameKey]=profile.fullName||"";if(role.jobKey)out[role.jobKey]=profileJobLabel(profile,lang);if(role.departmentKey)out[role.departmentKey]=profileDepartmentLabel(profile,lang);return out;
};
applyProfileToRole=function(profile,role,mode="replace"){
 if(!profile||!role)return;
 if(role.mode==="append"){
   const line=[profile.fullName,profileJobLabel(profile,lang)].filter(Boolean).join(" -- ");
   const old=String(current.values[role.listKey]||"").trim();
   current.values[role.listKey]=old?old+"\n"+line:line;
 }else{
   const values=profileRoleMap(profile,role);Object.entries(values).forEach(([key,value])=>{if(value&&(mode==="replace"||!String(current.values[key]||"").trim()))current.values[key]=value});
 }
 if(role.id==="author")current.profileId=profile.id;saveState();closeModal();renderAll();showToast(`${profile.label||profile.fullName} → ${role.label}`);
};
function roleCurrentValue(role){

}
function focusRoleField(role){const key=role.mode==="append"?role.listKey:(role.nameKey||role.jobKey);const el=document.querySelector(`[data-fill-key="${CSS.escape(key||"")}"]`);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.focus()}}
