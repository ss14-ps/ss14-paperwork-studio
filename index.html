<style>

}

.brand{min-width:214px}.brand strong{display:block;color:#eee4d1;font:800 13px/1 ui-monospace,"Liberation Mono",monospace;letter-spacing:.14em}.brand small{display:block;margin-top:4px;color:#8c8577;font:8px/1.2 ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em}
.archive-status{flex:1;color:#7e786b;font:9px ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em}
.top-actions{display:flex;align-items:center;gap:5px}.lang-switch{display:flex;border:1px solid var(--line);background:var(--panel)}.lang-switch button{height:30px;border:0;border-right:1px solid var(--line);background:transparent;padding:0 9px;color:#908979;font:700 9px ui-monospace,"Liberation Mono",monospace}.lang-switch button:last-child{border-right:0}.lang-switch button.active{background:#e8e0d0;color:#25261f}
.soft-btn,.primary-btn,.icon-btn{height:32px;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 10px;border:1px solid var(--line);background:#22231f;color:#c9c1b2;font:700 9px ui-monospace,"Liberation Mono",monospace;letter-spacing:.02em}.soft-btn:hover,.icon-btn:hover{border-color:#797161;background:#292a24}.primary-btn{border-color:#cc6a5e;background:var(--red);color:#fff7e9}.primary-btn:hover{background:#c55245}.archive-action i{display:inline-block;width:5px;height:5px;background:transparent}.archive-action i.on{background:var(--brass)}

.workspace{height:calc(100vh - 56px);display:grid;grid-template-columns:285px 300px minmax(470px,1fr);gap:1px;background:#4a493f;overflow:hidden}.panel{min-width:0;min-height:0;background:var(--panel)}.sidebar,.builder,.preview{display:flex;flex-direction:column;min-height:0}.scroll{overflow:auto}

.finder-head{padding:13px 12px 10px;background:var(--panel);border-bottom:1px solid var(--line)}.finder-head>.eyebrow,.builder-top .eyebrow{display:none}.finder-head h2{margin:0 0 10px;color:#eee4d1;font:800 14px ui-monospace,"Liberation Mono",monospace;letter-spacing:.08em;text-transform:uppercase}

.finder-tabs{display:grid;grid-template-columns:1fr 1fr;margin-top:8px;border-bottom:1px solid var(--line-soft)}.finder-tabs button{height:29px;border:0;border-bottom:2px solid transparent;background:transparent;color:#918a7b;font:700 8px ui-monospace,"Liberation Mono",monospace;letter-spacing:.09em;text-transform:uppercase}.finder-tabs button.active{border-bottom-color:var(--red);color:#eee5d4}
.action-chips{display:flex;gap:4px;padding-top:8px;overflow-x:auto;scrollbar-width:none}.action-chips::-webkit-scrollbar{display:none}.action-chip{flex:0 0 auto;border:1px solid #55554a;background:transparent;padding:5px 8px;color:#aaa290;font:8px ui-monospace,"Liberation Mono",monospace}.action-chip:hover,.action-chip.active{border-color:#e5dcc9;background:#e5dcc9;color:#272821}
.smart-list,.preset-list{flex:1;overflow:auto;padding:0}.smart-section{margin:0}.smart-section-head{display:flex;justify-content:space-between;padding:8px 11px 6px;border-bottom:1px solid var(--line-soft);background:#1b1c19}.smart-section-head strong{color:#8f8879;font:700 8px ui-monospace,"Liberation Mono",monospace;letter-spacing:.13em;text-transform:uppercase}.smart-section-head span{color:#6f6a60;font:8px ui-monospace,"Liberation Mono",monospace}
.result-card{position:relative;margin:0;padding:9px 32px 9px 11px;border:0;border-bottom:1px solid #3e3f37;border-left:3px solid transparent;background:#22231f;cursor:pointer}.result-card:hover{background:#292a24;border-left-color:#827965}.result-card.active{background:#2b2b25;border-left-color:var(--red)}.archive-ref{margin-bottom:3px;color:#8c8576;font:7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em}.result-title{color:#eee5d5;font-size:10.5px;font-weight:700;line-height:1.25}.result-desc{display:-webkit-box;margin:3px 0 5px;overflow:hidden;color:#aaa392;font-size:8.6px;line-height:1.35;-webkit-line-clamp:1;-webkit-box-orient:vertical}.result-meta{display:flex;justify-content:space-between;color:#7f796c;font:7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.07em;text-transform:uppercase}.meta-pill{display:none}.fav-btn{position:absolute;right:5px;top:5px;width:24px;height:24px;border:0;background:transparent;color:#777163}.fav-btn.on{color:var(--brass)}
.catalog-row{position:relative;display:flex;align-items:center;gap:8px;min-height:35px;padding:7px 34px 7px 10px;border-bottom:1px solid var(--line-soft);background:#22231f;cursor:pointer}.catalog-row:hover{background:#292a24}.catalog-row.active{border-left:3px solid var(--red);background:#2b2b25}.catalog-index{width:26px;color:#7e786a;font:8px ui-monospace,"Liberation Mono",monospace}.catalog-name{flex:1;font-size:9.5px}.catalog-row .fav-btn{top:5px}.catalog-kind{display:none}.no-results,.empty{display:grid;min-height:110px;place-items:center;padding:20px;color:#918a7b;text-align:center;font-size:10px;line-height:1.5}
.sidebar-footer{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:7px;border-top:1px solid var(--line);background:#1b1c19}.sidebar-footer button{min-height:29px;border:1px solid var(--line);background:#23241f;color:#bbb3a4;font-size:8px}

.builder-top.compact{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;border-bottom:1px solid var(--line);background:#1b1c19}.builder-top.compact h2{max-width:170px;margin:0;overflow:hidden;color:#eee4d2;font:700 11px ui-monospace,"Liberation Mono",monospace;text-overflow:ellipsis;white-space:nowrap}.builder-mode-switch{display:flex;border:1px solid var(--line)}.builder-mode-switch button{height:27px;border:0;border-right:1px solid var(--line);background:transparent;padding:0 7px;color:#918a7c;font:700 8px ui-monospace,"Liberation Mono",monospace;text-transform:uppercase}.builder-mode-switch button:last-child{border-right:0}.builder-mode-switch button.active{background:#e7decd;color:#272821}
.fill-workspace{flex:1;overflow:auto}.document-brief{padding:12px;border-bottom:1px solid var(--line);background:#252620}.brief-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.brief-ref{margin-bottom:5px;color:var(--brass);font:7.5px ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em}.document-brief h3{margin:0;color:#eee4d2;font-size:12px;line-height:1.35}.brief-tools{display:flex;gap:4px}.brief-tools button{height:27px;border:1px solid #5a5549;background:transparent;padding:0 7px;color:#c2b59f;font:8px ui-monospace,"Liberation Mono",monospace}.brief-tools button:hover{border-color:var(--brass);color:#ead4aa}
.fill-fields{display:grid;gap:7px;padding:7px 12px 12px}.fill-section-title{margin:8px 0 2px;padding-bottom:4px;border-bottom:1px solid var(--line)}.fill-section-title strong{color:#8e8778;font:700 8px ui-monospace,"Liberation Mono",monospace;letter-spacing:.13em;text-transform:uppercase}.fill-control{padding:0}.fill-control label{display:block;margin-bottom:4px;color:#b0a997;font:8.5px ui-monospace,"Liberation Mono",monospace}.fill-control input,.fill-control textarea{width:100%;border:1px solid #505147;background:var(--panel-dark);padding:7px 8px;color:#eee7d8;font-size:10.5px;outline:0}.fill-control input{height:34px}.fill-control textarea{min-height:58px;resize:vertical;line-height:1.45}.fill-control input:focus,.fill-control textarea:focus{border-color:var(--brass);box-shadow:inset 3px 0 0 var(--brass)}.fill-code-button{width:100%;height:34px;overflow:hidden;border:1px solid #75423d;background:#241d1b;padding:0 9px;color:#dc8177;text-align:left;font-size:10px;font-weight:700;text-overflow:ellipsis;white-space:nowrap}
.smart-options{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}.smart-option{border:1px solid #55554a;background:transparent;padding:4px 6px;color:#a9a18f;font:8px ui-monospace,"Liberation Mono",monospace}.smart-option.on{border-color:var(--brass);background:#3a3327;color:#ead8b7}
.wording-actions{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 12px 13px}.wording-actions button{min-height:30px;border:1px solid #5c554b;background:transparent;color:#c2b49c;font:8.5px ui-monospace,"Liberation Mono",monospace}.wording-actions button:hover{border-color:var(--brass);color:#ead8b7}
.manual-workspace{display:flex;flex:1;min-height:0;flex-direction:column}.manual-tools{display:flex;flex-wrap:wrap;gap:4px;padding:7px;border-bottom:1px solid var(--line)}.manual-tools button{border:1px solid var(--line);background:#23241f;padding:5px 7px;color:#bdb5a6;font-size:8px}.blocks{max-height:30%;overflow:auto;padding:7px;border-bottom:1px solid var(--line)}.block-card{display:flex;align-items:center;gap:7px;min-height:47px;margin-bottom:4px;padding:7px;border:1px solid var(--line);background:#242520;cursor:pointer}.block-card.selected{border-left:3px solid var(--red);background:#2b2b25}.drag,.x-btn{border:0;background:transparent;color:#777164}.drag{cursor:grab}.block-index{color:#777164;font:8px ui-monospace,"Liberation Mono",monospace}.block-copy{min-width:0;flex:1}.block-copy strong{display:block;font-size:9.5px}.block-copy small{display:block;margin-top:3px;overflow:hidden;color:#8f8879;font-size:8px;text-overflow:ellipsis;white-space:nowrap}.editor{flex:1;overflow:auto;padding:10px}.editor label,.field-row label{display:block;margin:9px 0 4px;color:#9f9787;font:8px ui-monospace,"Liberation Mono",monospace}.editor input,.editor textarea,.editor select,.field-row input{width:100%;border:1px solid var(--line);background:var(--panel-dark);padding:7px;color:#eee7d8;outline:0}.editor textarea{min-height:135px;resize:vertical;font:10px/1.5 ui-monospace,"Liberation Mono",monospace}.toolbar{display:flex;flex-wrap:wrap;gap:3px;margin:7px 0}.toolbar button{height:27px;min-width:27px;border:1px solid var(--line);background:#242520;padding:0 6px;color:#c4bcad;font-size:8px}.danger{width:100%;margin-top:9px;border:1px solid #67413d;background:#271c1b;padding:7px;color:#d57a70;font-size:8px}.quick-fields{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}.quick-head{display:flex;justify-content:space-between}.quick-head strong{font-size:9px}.quick-head span{color:#777164;font-size:7px}.field-list{display:grid;gap:6px;margin-top:6px}.dept-summary{display:grid;gap:6px;padding:8px;border:1px solid var(--line);background:#242520}.dept-summary strong{font-size:9px}.dept-summary small{color:#817b6f;font-size:7px}.dept-summary button{border:1px solid #67413d;background:#271c1b;padding:6px;color:#d57a70;font-size:8px}

.preview-bar{height:42px;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid var(--line);background:#1b1c19}.tabs{display:flex;height:100%}.tab{height:100%;border:0;border-bottom:2px solid transparent;background:transparent;padding:0 9px;color:#8e8778;font:700 8px ui-monospace,"Liberation Mono",monospace;letter-spacing:.09em;text-transform:uppercase}.tab.active{border-bottom-color:var(--red);color:#eee4d2}.preview-canvas{flex:1;overflow:auto;padding:22px;background:#11120f}.paper{position:relative;width:500px;max-width:calc(100vw - 42px);min-height:625px;margin:auto;overflow:hidden;background:var(--paper);padding:26px 15px 42px;color:var(--ink);box-shadow:0 18px 48px #0009}.paper:before{content:"ARCHIVE COPY";position:absolute;top:10px;right:12px;border:1px solid #9b3f3626;padding:3px 5px;color:#9b3f3626;font:700 8px ui-monospace,monospace;transform:rotate(-2deg)}.paper:after{content:"NT";position:absolute;right:-20px;bottom:-54px;color:#244b7609;font-size:180px;font-weight:900;transform:rotate(-12deg);pointer-events:none}.paper-section{position:relative;margin:0;overflow-wrap:anywhere;color:#202935;font:13.2px/1.48 "Noto Sans",Arial,sans-serif;white-space:pre-wrap}.paper-section.header{overflow:hidden;font:9.7px/1.37 ui-monospace,"Liberation Mono",monospace;white-space:pre}.paper-section.title{overflow:hidden;font:650 10.4px/1.4 ui-monospace,"Liberation Mono",monospace;white-space:pre}.paper-section.stamp{font:11px ui-monospace,"Liberation Mono",monospace}.paper-section h1,.paper-section h2,.paper-section h3{display:inline;margin:0;font:inherit;font-weight:800}.paper-section code{font-family:ui-monospace,"Liberation Mono",monospace}.paper-field{display:inline-block;min-width:42px;max-width:245px;margin:0 1px;border:0;border-bottom:1px dashed #397fbd;background:#5ca5e817;padding:0 3px;color:#173d61;font:inherit;line-height:1.3;vertical-align:baseline}.paper-field:hover{background:#5ca5e82c}.paper-field:focus{position:relative;z-index:4;outline:1px solid #4a9ce5;background:#fff}.paper-field.missing{border-bottom-color:#d88a2d;background:#f1ad451c}.paper-field::placeholder{color:#5880a3;font-style:italic;opacity:.85}.paper-section.header .paper-field{min-width:24px;max-width:116px}.paper-section.header input[data-field-key="station"]{max-width:110px}.code-picker-field{min-width:48px!important;max-width:82px!important;overflow:hidden;padding:0 4px!important;color:#8b2730!important;font-size:9.5px!important;font-weight:800;line-height:1.3;text-overflow:ellipsis;white-space:nowrap}.editable-copy{margin:-2px -3px 0;padding:2px 3px;border:1px dashed transparent;cursor:text}.editable-copy:hover{border-color:#8e7e62}.copy-edit-badge{position:absolute;top:2px;right:2px;z-index:3;width:22px;height:20px;border:1px solid #8f7f63;background:#eee7d7;color:#5c5140;font-size:10px;opacity:0}.editable-copy:hover .copy-edit-badge{opacity:1}
.raw-box{width:min(900px,96%);margin:auto;overflow:hidden;border:1px solid var(--line);background:#171815;box-shadow:0 16px 45px #0008}.raw-head{height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 11px;border-bottom:1px solid var(--line);color:#817a6d;font:700 8px ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em}.raw-head button{border:1px solid var(--line);background:#23241f;padding:5px 7px;font-size:8px}.raw-box pre{max-height:70vh;margin:0;overflow:auto;padding:16px;color:#d0c8b9;font:10px/1.55 ui-monospace,"Liberation Mono",monospace;white-space:pre-wrap}

.modal-backdrop{position:fixed;inset:0;z-index:60;display:grid;place-items:center;background:#000b}.modal{width:min(560px,92vw);max-height:84vh;overflow:auto;border:1px solid #5b5b50;background:var(--panel);padding:15px;box-shadow:0 25px 70px #000b}.modal-wide{width:min(700px,94vw)}.modal h3{margin:0 0 11px;color:#eee4d2;font:800 12px ui-monospace,"Liberation Mono",monospace;letter-spacing:.06em;text-transform:uppercase}.modal label{display:block;margin:9px 0 4px;color:#9f9788;font:8px ui-monospace,"Liberation Mono",monospace}.modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--line);background:var(--panel-dark);padding:7px;color:#eee7d8;font-size:10px}.modal textarea{min-height:160px;resize:vertical;font-family:ui-monospace,"Liberation Mono",monospace}.modal-actions{display:flex;justify-content:flex-end;gap:4px;margin-top:12px}.modal-actions button{border:1px solid var(--line);background:#23241f;padding:7px 9px;color:#c2baa9;font-size:8px}.modal-actions .primary-btn{border-color:#cc6a5e;background:var(--red);color:#fff6e8}.copy-editor-note{margin-bottom:9px;border-left:3px solid #756a58;background:#26261f;padding:8px;color:#a9a18f;font-size:9px;line-height:1.45}.copy-editor-title{font-size:15px!important;font-weight:800}.copy-editor-text{min-height:250px!important}.dept-grid{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:7px;align-items:end}.dept-arrow{padding-bottom:8px;color:#8f8879}.custom-code-input{margin-top:5px}.code-suggestions{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}.code-suggestions button{border:1px solid #6d6049;background:#2b2921;padding:6px 8px;color:#dec18a;font:8px ui-monospace,"Liberation Mono",monospace}

.draft-modal-head,.profile-modal-head,.clause-modal-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding-bottom:9px;border-bottom:1px solid var(--line)}.draft-modal-head span,.profile-modal-head span,.clause-modal-head span{color:#8a8374;font:7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.14em}.draft-modal-head h3,.profile-modal-head h3,.clause-modal-head h3{margin:3px 0 0}.draft-modal-head>button,.profile-modal-head>button,.clause-modal-head>button{border:1px solid var(--brass);background:transparent;padding:6px 8px;color:#dfc38d;font:8px ui-monospace,"Liberation Mono",monospace}.draft-list,.profile-list,.clause-list{padding-top:9px}.draft-section-label,.list-section-label{margin:9px 0 5px;color:#8c8576;font:700 7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.13em;text-transform:uppercase}.draft-row,.profile-row,.clause-row{display:flex;align-items:center;justify-content:space-between;gap:9px;margin-bottom:4px;border:1px solid #45463d;border-left:3px solid #766e5c;background:#242520;padding:8px}.draft-file,.profile-file,.clause-copy{min-width:0;flex:1}.draft-file strong,.profile-file strong,.clause-copy strong{display:block;overflow:hidden;color:#eae1d1;font-size:9.5px;text-overflow:ellipsis;white-space:nowrap}.draft-file small,.profile-file small,.clause-copy small{display:block;margin-top:2px;color:#7f796c;font:7.5px ui-monospace,"Liberation Mono",monospace}.draft-tab{display:block;margin-bottom:2px;color:var(--brass);font:7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.1em}.draft-actions,.profile-actions,.clause-actions{display:flex;gap:3px}.draft-actions button,.profile-actions button,.clause-actions button{border:1px solid #55564b;background:#1b1c19;padding:5px 7px;color:#bdb5a5;font-size:7.5px}.draft-actions .draft-delete,.profile-actions .delete,.clause-actions .delete{color:#c9786e;border-color:#67413d}.draft-empty,.list-empty{padding:25px 10px;color:#8f8879;text-align:center;font-size:9px}
.profile-conflict{margin:8px 0;border-left:3px solid var(--red);background:#28201e;padding:8px;color:#cdbca8;font-size:9px;line-height:1.45}.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.profile-grid .full{grid-column:1/-1}
.clause-category{padding:7px 0 4px;color:#968e7d;font:700 7px ui-monospace,"Liberation Mono",monospace;letter-spacing:.12em;text-transform:uppercase}.clause-row{cursor:pointer}.clause-row:hover{border-left-color:var(--brass);background:#292a24}.clause-copy strong{white-space:normal;line-height:1.35}.custom-clause-form{display:grid;grid-template-columns:1fr auto;gap:4px;margin-top:10px}.custom-clause-form input{min-width:0}.custom-clause-form button{border:1px solid var(--brass);background:transparent;padding:0 9px;color:#dec18a;font-size:8px}

@media(max-width:1100px){.workspace{grid-template-columns:265px 285px minmax(430px,1fr)}.archive-status{display:none}.brand{min-width:178px}}

/* v0.8 — square corners */
*{border-radius:0!important}
.profile-head-actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

.profile-storage-note{margin-top:8px;padding:6px 8px;border:1px solid #45463d;background:#1b1c19;color:#827b6d;font:7.5px ui-monospace,"Liberation Mono",monospace}
.profile-job-custom{width:100%;margin-top:5px}
.paper{border-radius:2px}
.paper-field,.copy-edit-badge{border-radius:2px 2px 0 0}
.result-card,.catalog-row,.smart-section-head,.document-brief,.fill-section-title{border-radius:0}
.preview-bar{justify-content:space-between}

.preview-zoom button:last-child{border-right:0}

eld:author_name|ФИО составителя|(ФИО)}}, в должности {{field:author_job|Должность составителя|(полное наименование должности)}}, исходя из принципов равенства прав всех разумных существ, установленного ОПРС, признаю данное существо разумным.\nВнешний вид существа: {{field:line_field_1|Внешний вид существа|}}\n\nУстанавливаемое полное имя существа: {{field:line_field_2|Устанавливаемое полное имя существа|}}\n\nСущество принято/не принято в качестве пассажира станции до окончания смены."},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n                            [italic]Место для печатей[/italic]"}]},"docType":"Приказ","descriptionRu":"После написания данного документа на существо начинают действовать все основные права разумных существ.","searchRu":"Приказ о признании разумности существа После написания данного документа на существо начинают действовать все основные права разумных существ. Полномочие на признание разумности существа имеют Научный руководитель и Капитан станции. Если есть возможность, стоит также привлечь психолога к тестированию психологического состояния существа и его вербальных способностей. Решение о возможности существа стать пассажиром станции принимает Капитан или ЦК, без его печати данный пункт не действителен. Если Капитан или ЦК приняли решение об отказе, то существо должно содержаться в бриге до конца смены согласно процедуре СБ. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 НИО[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ПРИКАЗ О ПРИЗНАНИИ РАЗУМНОСТИ СУЩЕСТВА ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: В ходе тестирования существа function departmentByAny(value){
 const normalized=String(value||"").trim().toUpperCase();
 return DEPARTMENTS.find(item=>[item.id,item.code,item.codeEn].map(x=>String(x||"").toUpperCase()).includes(normalized))||null;
}
function departmentCode(item,targetLang=lang){return targetLang==="en"?(item.codeEn||item.code):item.code}
function translateDepartmentRoute(route,targetLang=lang){
 return String(route||"").split("-").map(part=>{
  const value=part.trim();
  const item=departmentByAny(value);
  if(item)return departmentCode(item,targetLang);
  if(/^(КОД|CODE)$/i.test(value))return targetLang==="en"?"CODE":"КОД";
  return value;
 }).filter(Boolean).join("-");
}
function departmentName(value,targetLang=lang){const item=departmentByAny(value);return item?item[targetLang]:String(value||"")}
function jobEntries(department){const item=departmentByAny(department);return JOBS_BY_DEPARTMENT[item?.code||department]||[]}
function jobEntryByAny(department,value){const target=String(value||"");return jobEntries(department).find(item=>item.id===target||item.ru===target||item.en===target)||null}
function profileDepartmentLabel(profile,targetLang=lang){
 if(!profile)return "";
 return profile.departmentCustom||departmentName(profile.department,targetLang)||profile.department||"";
}
function profileJobLabel(profile,targetLang=lang){
 if(!profile)return "";
 if(profile.jobCustom)return profile.jobCustom;
 const entry=jobEntryByAny(profile.department,profile.jobId||profile.job);
 return entry?entry[targetLang]:(profile.job||"");
}

function tokenToSentinels(text){
 const fields=[];
 const replaced=String(text).replace(/\{\{field:([^|}]+)\|([^|}]*)\|([^}]*)\}\}/g,(_,key,label,fallback)=>{
  const n=fields.length;fields.push({key,label,fallback});return `@@FIELD_${n}@@`;
 });
 return {replaced,fields};
}
function renderMarkup(text){
 const {replaced,fields}=tokenToSentinels(text);
 let s=esc(replaced);
 s=s.replace(/\[color=([^\]]+)\]([\s\S]*?)\[\/color\]/gi,'<span style="color:$1">$2</span>')
 .replace(/\[bolditalic\]([\s\S]*?)\[\/bolditalic\]/gi,"<strong><em>$1</em></strong>")
 .replace(/\[bold\]([\s\S]*?)\[\/bold\]/gi,"<strong>$1</strong>")
 .replace(/\[italic\]([\s\S]*?)\[\/italic\]/gi,"<em>$1</em>")
 .replace(/\[mono\]([\s\S]*?)\[\/mono\]/gi,"<code>$1</code>")
 .replace(/\[head=1\]([\s\S]*?)\[\/head\]/gi,"<h1>$1</h1>")
 .replace(/\[head=2\]([\s\S]*?)\[\/head\]/gi,"<h2>$1</h2>")
 .replace(/\[head=3\]([\s\S]*?)\[\/head\]/gi,"<h3>$1</h3>")
 .replace(/\[\/(?:italic|color|bold|mono|head)\]/gi,"");
 fields.forEach((f,i)=>{
   const val=current.values[f.key]??"";
   const required=isRequired(f);
   let input;
   if(f.key==="department_code"){
     const code=departmentCodeValue();
     input=`<button type="button" class="paper-field code-picker-field" data-field-key="department_code" data-department-picker title="${esc(t("departmentRoute"))}">${esc(code)}</button>`;
   }else{
     const shown=String(val||"");
     input=`<span role="textbox" contenteditable="true" spellcheck="false" class="paper-field ${required&&!shown.trim()?"missing":""}" data-field-key="${esc(f.key)}" data-placeholder="${esc(f.label)}" title="${esc(f.label)}">${esc(shown)}</span>`;
   }
   s=s.replace(`@@FIELD_${i}@@`,input);
 });
 return s;
}

   return `<section class="paper-section ${esc(b.type)} ${editable?"editable-copy":""}" data-block-id="${esc(b.id)}">${badge}${renderMarkup(b.content)}</section>`;

function expandedQuery(query){
 const base=normalizeSearch(query),tokens=base.split(" ").filter(Boolean);
 const extra=[];
 tokens.forEach(token=>{if(SEARCH_ALIASES[token])extra.push(SEARCH_ALIASES[token])});
 return normalizeSearch([base,...extra].join(" "));
}
function presetText(p){
 const content=(p.variants?.[lang]||p.variants?.ru||[]).map(b=>b.content).join(" ");
 const description=lang==="en"?(p.descriptionEn||""):(p.descriptionRu||"");
 return normalizeSearch([p.name?.[lang],description,p.searchRu,p.keywordsRu,content,GROUPS[p.group]?.[lang]].join(" "));
}
function presetKind(p){

 const name=p.name?.ru||"";
 return ["Заявление","Разрешение","Отчёт","Приказ","Жалоба","Свидетельство","Запрос","Заказ","Решение","Заключение","Обращение"].find(x=>name.startsWith(x))||"Документ";

function searchScore(p,query){
 if(activeTypeFilter&&presetKind(p)!==activeTypeFilter)return -1;
 const q=expandedQuery(query);if(!q)return 1;
 const title=normalizeSearch(p.name?.[lang]||p.name?.ru||"");
 const desc=normalizeSearch(lang==="en"?(p.descriptionEn||""):(p.descriptionRu||""));
 const keywords=normalizeSearch(p.keywordsRu||"");
 const hay=presetText(p);let score=0;
 if(title===q)score+=500;if(title.includes(q))score+=180;if(desc.includes(q))score+=80;if(keywords.includes(q))score+=100;
 const tokens=q.split(" ").filter(x=>x.length>1);
 tokens.forEach(token=>{if(title.includes(token))score+=42;if(keywords.includes(token))score+=28;if(desc.includes(token))score+=18;if(hay.includes(token))score+=5});
 if(tokens.length&&tokens.every(token=>hay.includes(token)))score+=75;
 return score;
}

function titleLineInfo(content){
 const lines=String(content).split("\n");
 let index=lines.findIndex(line=>line.trim()&&!/^=+$/.test(line.trim()));
 if(index<0)index=0;
 const raw=lines[index]||"";
 const leading=(raw.match(/^\s*/)||[""])[0];
 const bold=/\[bold\]([\s\S]*?)\[\/bold\]/i.exec(raw);
 const head=/\[head=\d\]([\s\S]*?)\[\/head\]/i.exec(raw);
 const value=(bold?.[1]||head?.[1]||raw.trim()).replace(/\[[^\]]+\]/g,"").trim();
 return {lines,index,raw,leading,value,bold:!!bold,head:head?head[0].match(/\[head=\d\]/i)?.[0]:null};
}

function fieldifyImported(text,values){
 const defs=[[/^(Время от начала смены и дата)\s*:\s*(.*)$/im,"shift_time","Время и дата"],[/^(Составитель документа)\s*:\s*(.*)$/im,"author_name","ФИО составителя"],[/^(Должность составителя)\s*:\s*(.*)$/im,"author_job","Должность составителя"]];
 let out=text;defs.forEach(([rx,key,label])=>{const m=out.match(rx);if(m){values[key]=(m[2]||"").trim();out=out.replace(rx,`${m[1]}: {{field:${key}|${label}|}}`)}});return out;
}
function parseImportedDocument(raw){
 const text=String(raw||"").replace(/\r\n?/g,"\n").trim();const values={};if(!text)return {blocks:[],values};
 const lines=text.split("\n"),dividers=[];lines.forEach((line,i)=>{if(/^\s*={8,}\s*$/.test(line))dividers.push(i)});let result=[];
 if(dividers.length>=2){const first=dividers[0],second=dividers[1];const before=lines.slice(0,first).join("\n").trim();const title=lines.slice(first,second+1).join("\n").trim();let rest=lines.slice(second+1).join("\n").trim();if(before)result.push({id:uid("header"),type:"header",labelRu:"Импортированная шапка",content:fieldifyImported(before,values)});if(title)result.push({id:uid("title"),type:"title",labelRu:"Название документа",content:title});if(rest){const last=rest.lastIndexOf("=============================================");if(last>0&&/печати/i.test(rest.slice(last))){const body=rest.slice(0,last).trim(),stamp=rest.slice(last).trim();if(body)result.push({id:uid("text"),type:"text",labelRu:"Содержание документа",content:fieldifyImported(body,values)});result.push({id:uid("stamp"),type:"stamp",labelRu:"Место для печатей",content:stamp})}else result.push({id:uid("text"),type:"text",labelRu:"Содержание документа",content:fieldifyImported(rest,values)})}
 }else result=[{id:uid("text"),type:"text",labelRu:"Импортированный документ",content:fieldifyImported(text,values)}];return {blocks:result,values};
}

// Application-level undo/redo. Snapshots cover fields, blocks, selected document and editor mode.
const historyLimit=60;
let historyEntries=[],historyIndex=-1,historyRestoring=false;
function historySnapshot(){return {current:clone(current),currentPresetId,selectedBlockId,builderMode,currentTab}}
function historyKey(snapshot){return JSON.stringify(snapshot)}
function recordHistory(){
 if(historyRestoring||!current)return;
 const snapshot=historySnapshot(),key=historyKey(snapshot);
 if(historyIndex>=0&&historyEntries[historyIndex]?.key===key){updateHistoryButtons();return}
 historyEntries=historyEntries.slice(0,historyIndex+1);
 historyEntries.push({key,snapshot});
 if(historyEntries.length>historyLimit)historyEntries.shift();
 historyIndex=historyEntries.length-1;updateHistoryButtons();
}
function resetHistory(){historyEntries=[];historyIndex=-1;recordHistory()}
function restoreHistory(index){
 if(index<0||index>=historyEntries.length)return;
 historyRestoring=true;
 const snapshot=clone(historyEntries[index].snapshot);
 current=snapshot.current;currentPresetId=snapshot.currentPresetId;selectedBlockId=snapshot.selectedBlockId;
 builderMode=snapshot.builderMode||"fill";currentTab=snapshot.currentTab||"preview";historyIndex=index;
 localStorage.setItem("ss14-last-draft",JSON.stringify(draftSnapshot("","autosave")));
 renderAll();updateDraftIndicator();historyRestoring=false;updateHistoryButtons();
}
function undoChange(){if(historyIndex>0)restoreHistory(historyIndex-1)}
function redoChange(){if(historyIndex<historyEntries.length-1)restoreHistory(historyIndex+1)}
function updateHistoryButtons(){
 const undo=document.getElementById("undoBtn"),redo=document.getElementById("redoBtn");
 if(undo)undo.disabled=historyIndex<=0;if(redo)redo.disabled=historyIndex<0||historyIndex>=historyEntries.length-1;
}

ьном ответе ЦК снять юридическую неприкосновенность таким образом запрещено; Отстранение Капитана от его должности согласно процедуре; Принятие Главы отдела на должность ВрИО Капитана; Принятие решение на запрос членов ЦК, ДСО; Принятие решения о признании цели невыполнимой и завершении смены. В течение одного Собрания можно решить несколько вопросов. В таком случае пишется результаты голосования по каждому из вопросов. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ОТЧЁТ О СОБРАНИИ ГЛАВ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Причина созыва Собрания Глав: Формулировка поставленного перед Главами вопроса: Количество голосов «За»: Проголосовавшие «За»: Количество голосов «Против»: Проголосовавшие «Против»: Количество воздержавшихся от голосования: Воздержавшиеся от голосования: Решение Собрания Глав: ============================================= [italic]Место для печатей[/italic] отчёт отчет доложить результаты работа состояние report сводка","keywordsRu":"отчёт отчет доложить результаты работа состояние report сводка"},{"id":"wiki-11","group":"command","builtin":true,"name":{"ru":"Заявление о трудоустройстве"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color] [bold]{{field:station|Объект / станция|Station XX-000}} {{field:department_code|Кодификация отдела|ПД-КОМ}}[/bold]\n[color=#1b487e]░░░░██░░░████ ствует, решение о переводе может принять Глава Персонала. При переводе в другой отдел Глава текущего отдела должен быть об этом уведомлен. Приём на должности выше низших в иерархии отдела может быть осуществлен только при согласии Главы отдела и при наличии необходимого уровня квалификации. И Грузчики, и утилизаторы являются низшими по иерархии должностями. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ЗАЯВЛЕНИЕ О ТРУДОУСТРОЙСТВЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в текущей должности (полное наименование должности), прошу назначить меня сотрудником (название отдела трудоустройства) в должности (полное наименование должности). Обязуюсь следовать Стандартным Рабочим Процедурам отдела. Обязуюсь сдать рабочее снаряжение и экипировку отдела при переводе. ============================================= [italic]Место для печатей[/italic] заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен","keywordsRu":"заявление попросить прошу оформление просьба подать заявку устроиться на работу принять на работу новая должность сменить профессию перевод работа врач инженер бармен"},{"id":"wiki-12","group":"command","builtin":true,"name":{"ru":"Заявление об увольнении"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head]\n[color=#1b487 ти {{field:author_job|Должность составителя|(полное наименование должности)}}, прошу рассмотреть {{field:person_name_1|ФИО|(ФИО)}}, в должности {{field:person_job_1|полное наименование должности|(полное наименование должности)}} моё обращение.\nСодержание обращения: {{field:line_field_1|Содержание обращения|}}\n\nПричины его написания: {{field:line_field_2|Причины его написания|}}\n"},{"id":"stamp-5","type":"stamp","labelRu":"Место для печатей","content":"=============================================\n                            [italic]Место для печатей[/italic]"}]},"docType":"Обращение","descriptionRu":"Пишется лицом с целью официального обращения к какому-либо должностному лицу или сотруднику со свободным содержанием.","searchRu":"Обращение Пишется лицом с целью официального обращения к какому-либо должностному лицу или сотруднику со свободным содержанием. Может содержать какую-либо просьбу, совет или жалобу в официальном или полу-официальном формате. В целом в данной форме можно написать что-либо, что вы обычно запрашиваете при получении иных форм. Например обращение о регистрации брака, разрешении на оружие, на доступы или передвижение и т.п. Обращения могут быть направлены и в Центральное Командование, в таком случае код обращения будет ПД-ЦК. Также по данной форме пишется обращение к Магистрату с целью урегулирования ситуации, в таком случае код обращения будет ПД-ЮР, обращение осуществляется по соответствующей процедуре. Примеры ситуаций: Возникновение ситуации, при которой Корпоративный Закон не способен защитить ущемление ОПРС какого-либо лица. Необходимость оспорить приговор, вынесенный Капитаном. Необходимость отстранить от работы Агента Внутренних Дел при нарушении им ОПРС, КЗ или СРП. Необходимость проведения судебной процедуры. [color=#1b487e]███░███░░░░██░░░░[/color] [color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head] [color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head] [color=#1b487e]░░░░██░░██░██░██░[/color] [bold]Station XX-000 ПД-КОМ[/bold] [color=#1b487e]░░░░██░░░████░███[/color] ============================================= ОБРАЩЕНИЕ ============================================= Время от начала смены и дата: Составитель документа: Должность составителя: Я, (ФИО), в должности (полное наименование должности), прошу рассмотреть (ФИО), в должности (полное наименование должности) моё обращение. Содержание обращения: Причины его написания: ============================================= [italic]Место для печатей[/italic] обращение просьба вопрос свободная форма универсальная просьба свободный документ брак оружие доступ передвижение написать начальнику","keywordsRu":"обращение просьба вопрос свободная форма универсальная просьба свободный документ брак оружие доступ передвижение написать начальнику"},{"id":"wiki-14","group":"command","builtin":true,"name":{"ru":"Заявление на получение доступа"},"variants":{"ru":[{"id":"header-1","type":"header","labelRu":"Шапка NanoTrasen","content":"[color=#1b487e]███░███░░░░██░░░░[/color]\n[color=#1b487e]░██░████░░░██░░░░[/color]      [head=3]Бланк документа[/head]\n[color=#1b487e]░░█░██░██░░██░█░░[/color]               [head=3]NanoTrasen[/head]\n[color=#1b487e]░░░░██░░██░██░██░[/color] [bold]{{field:station|Объект / станция|Station XX-000}} {{field:department_code|Кодификация отдела|ПД-КОМ}}[/bold]\n[color=#1b487e]░░░░██░░░████░███[/color]"},{"id":"title-2","type":"title","labelRu":"Название документа","content":"=============================================\n                   ЗАЯВЛЕНИЕ НА ПОЛУЧЕНИЕ ДОСТУПА\n============================================="},{"id":"details-3","type":"details","labelRu":"Обязательные сведения","content":"Время от начала смены и дата: {{field:shift_time|Время и дата|}}\nСоставитель документа: {{field:author_name|ФИО составителя|}}\nДолжность составителя: {{field:author_job|Должность составителя|}}\n"},{"id":"text-4","type":"text","labelRu":"Содержание документа","content":"Я, {{field:author_name loadExternalData=async function(){
  BUILTIN_PRESETS=clone(EMBEDDED_FORM_DATA.presets||[]);
  const load=async(path)=>{const response=await fetch(path,{cache:"no-store"});if(!response.ok)throw new Error(path);return response.json()};
  const results=await Promise.allSettled([load("./data/departments.json"),load("./data/jobs.json"),load("./data/clauses.json"),load("./data/field-presets.json")]);
  const [departments,jobs,clauses,presets]=results.map(item=>item.status==="fulfilled"?item.value:null);
  if(Array.isArray(departments?.departments))DEPARTMENTS=departments.departments;
  if(jobs&&typeof jobs.jobs==="object")JOBS_BY_DEPARTMENT=jobs.jobs;
  if(Array.isArray(clauses?.clauses))STANDARD_CLAUSES=clauses.clauses;
  if(Array.isArray(presets?.presets))FIELD_PRESETS=presets.presets;
  customClauses=readJSON("ss14-custom-clauses",customClauses);
  customFieldPresets=readJSON("ss14-custom-field-presets",customFieldPresets);
  customTemplates=readJSON("ss14-custom-templates",customTemplates);
  customBlockPresets=readJSON("ss14-custom-block-presets",customBlockPresets);
  return true;
};

function roleFieldExists(key){return getFields().some(field=>field.key===key)}
function roleLabelFromField(key,fallback){return getFields().find(field=>field.key===key)?.label||fallback}
availableDocumentRoles=function(){
 const fields=getFields(),byKey=Object.fromEntries(fields.map(f=>[f.key,f])),roles=[];
 const addPair=(id,label,nameKey,jobKey,departmentKey="")=>{if(byKey[nameKey]||byKey[jobKey])roles.push({id,label,mode:"pair",nameKey:byKey[nameKey]?nameKey:"",jobKey:byKey[jobKey]?jobKey:"",departmentKey:departmentKey&&byKey[departmentKey]?departmentKey:""})};
 const addList=(id,label,key)=>{if(byKey[key])roles.push({id,label,mode:"append",listKey:key})};
 addPair("author","Составитель","author_name","author_job","author_department");
 addPair("applicant","Заявитель","applicant_name","applicant_job","applicant_department");
 const title=normalizeSearch(current.name?.ru||"");
 addPair("subject",/подозрев|арест|обыск/.test(title)?"Подозреваемый":"Участник документа","subject_name","subject_job","subject_department");
 for(let i=1;i<=6;i++){const n=`person_name_${i}`,j=`person_job_${i}`;if(byKey[n]||byKey[j])addPair(`person${i}`,roleLabelFromField(n,`Участник ${i}`),n,j)}
 addList("suspects","Подозреваемые","suspects");
 addList("victims","Потерпевшие","victims");
 addList("witnesses","Свидетели","witnesses");
 addList("experts","Эксперты","experts");
 [["recipient","Получатель"],["responsible","Ответственное лицо"],["giver","Передающая сторона"],["receiver","Получающая сторона"]].forEach(([key,label])=>{if(byKey[key])roles.push({id:key,label,mode:"single",nameKey:key})});
 return roles;
};

profileRoleMap=function(profile,role){
 if(role.mode==="append")return {};
 const out={};if(role.nameKey)out[role.nameKey]=profile.fullName||"";if(role.jobKey)out[role.jobKey]=profileJobLabel(profile,lang);if(role.departmentKey)out[role.departmentKey]=profileDepartmentLabel(profile,lang);return out;
};
applyProfileToRole=function(profile,role,mode="replace"){
 if(!profile||!role)return;
 if(role.mode==="append"){
   const line=[profile.fullName,profileJobLabel(profile,lang)].filter(Boolean).join(" -- ");
   const old=String(current.values[role.listKey]||"").trim();
   current.values[role.listKey]=old?old+"\n"+line:line;
 }else{
   const values=profileRoleMap(profile,role);Object.entries(values).forEach(([key,value])=>{if(value&&(mode==="replace"||!String(current.values[key]||"").trim()))current.values[key]=value});
 }
 if(role.id==="author")current.profileId=profile.id;saveState();closeModal();renderAll();showToast(`${profile.label||profile.fullName} → ${role.label}`);
};
function roleCurrentValue(role){
 if(role.mode==="append"){const v=String(current.values[role.listKey]||"").trim();return v?v.split(/\n+/)[0]+(v.includes("\n")?" …":""):"Не указан"}
 const name=String(current.values[role.nameKey]||"").trim(),job=String(current.values[role.jobKey]||"").trim();return [name,job].filter(Boolean).join(" · ")||"Не указан";
}
function focusRoleField(role){const key=role.mode==="append"?role.listKey:(role.nameKey||role.jobKey);const el=document.querySelector(`[data-fill-key="${CSS.escape(key||"")}"]`);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.focus()}}
function clearDocumentRole(role){if(role.mode==="append")current.values[role.listKey]="";else[role.nameKey,role.jobKey,role.departmentKey].filter(Boolean).forEach(key=>current.values[key]="");saveState();renderAll()}
function openRoleProfilePicker(roleId){
 const role=availableDocumentRoles().find(item=>item.id===roleId);if(!role)return;
 const active=activeProfile()||characterProfiles[0];
 modal(`<h3>Выбрать: ${esc(role.label)}</h3><div class="role-picker-note">Персонаж будет назначен только на роль «${esc(role.label)}». Остальные участники документа не изменятся.</div><input class="role-catalog-search" id="roleCatalogSearch" placeholder="Найти персонажа по имени, должности или отделу"><div class="role-picker-list" id="roleCatalogList">${characterProfiles.length?characterProfiles.map(profile=>`<div class="role-picker-item ${active&&profile.id===active.id?'active-character':''}" data-role-card="${esc(profile.id)}"><div><strong>${esc(profile.label||profile.fullName)}</strong><small>${esc([profile.fullName,profileJobLabel(profile,lang),profileDepartmentLabel(profile,lang)].filter(Boolean).join(" · "))}</small></div><button data-role-profile="${esc(profile.id)}">Назначить</button></div>`).join(""):`<div class="list-empty">Персонажей пока нет</div>`}</div><div class="modal-actions"><button id="roleManual">Ввести вручную</button><button id="roleProfiles">Каталог персонажей</button><button id="roleCancel">Отмена</button></div>`);
 const choose=id=>applyProfileToRole(characterProfiles.find(p=>p.id===id),role,"replace");
 document.querySelectorAll('[data-role-profile]').forEach(button=>button.onclick=e=>{e.stopPropagation();choose(button.dataset.roleProfile)});
 document.querySelectorAll('[data-role-card]').forEach(card=>card.onclick=()=>choose(card.dataset.roleCard));
 const search=document.getElementById('roleCatalogSearch');if(search)search.oninput=()=>{const q=normalizeSearch(search.value);document.querySelectorAll('[data-role-card]').forEach(card=>{const p=characterProfiles.find(x=>x.id===card.dataset.roleCard);const hay=normalizeSearch([p?.label,p?.fullName,profileJobLabel(p||{},lang),profileDepartmentLabel(p||{},lang)].join(' '));card.style.display=!q||hay.includes(q)?'grid':'none'})};
 document.getElementById('roleManual').onclick=()=>{closeModal();setTimeout(()=>focusRoleField(role),0)};document.getElementById('roleProfiles').onclick=openProfilesModal;document.getElementById('roleCancel').onclick=closeModal;
}
function participantChipValue(role){
 if(role.mode==="append"){
   const lines=String(current.values[role.listKey]||"").split(/\n+/).map(x=>x.trim()).filter(Boolean);
   if(!lines.length)return "Не указаны";
   const first=lines[0].split(/\s+--\s+|\s+—\s+/)[0];return lines.length>1?`${first}, +${lines.length-1}`:first;
 }
 const name=String(current.values[role.nameKey]||"").trim();return name||"Не указан";
}
roleToolbarHtml=function(){
 const roles=availableDocumentRoles();if(!roles.length)return "";const active=activeProfile()||characterProfiles[0];
 return `<section class="participants-panel"><div class="participants-panel-head"><strong>Участники</strong><span>${active?`Активный персонаж: ${esc(active.label||active.fullName)}`:"Откройте роль, чтобы выбрать персонажа"}</span></div><div class="participants-list">${roles.map(role=>{const value=participantChipValue(role),empty=/^Не указан/.test(value);return `<div class="participant-chip ${empty?'empty':''}" data-select-role="${esc(role.id)}" title="Выбрать: ${esc(role.label)}"><span class="participant-chip-role">${esc(role.label)}:</span><span class="participant-chip-value">${esc(value)}</span>${!empty?`<button class="participant-chip-clear" data-clear-role="${esc(role.id)}" title="Очистить">×</button>`:""}</div>`}).join("")}<button class="participant-add" data-open-participants title="Управление участниками">+</button></div></section>`;
};
function openParticipantsOverview(){
 const roles=availableDocumentRoles();
 modal(`<h3>Участники документа</h3><div class="role-picker-note">Выберите роль, затем персонажа. Для свидетелей, подозреваемых и других списков можно добавлять несколько человек.</div><div class="role-picker-list">${roles.map(role=>`<div class="role-picker-item" data-overview-role="${esc(role.id)}"><div><strong>${esc(role.label)}</strong><small>${esc(participantChipValue(role))}</small></div><button>Открыть</button></div>`).join("")}</div><div class="modal-actions"><button id="participantsClose">Закрыть</button></div>`);
 document.querySelectorAll('[data-overview-role]').forEach(x=>x.onclick=()=>openRoleProfilePicker(x.dataset.overviewRole));document.getElementById('participantsClose').onclick=closeModal;
}
function bindParticipantPanel(){
 document.querySelectorAll('[data-select-role]').forEach(node=>node.onclick=e=>{if(e.target.closest('[data-clear-role]'))return;openRoleProfilePicker(node.dataset.selectRole)});
 document.querySelectorAll('[data-clear-role]').forEach(button=>button.onclick=e=>{e.stopPropagation();clearDocumentRole(availableDocumentRoles().find(role=>role.id===button.dataset.clearRole))});
 const add=document.querySelector('[data-open-participants]');if(add)add.onclick=openParticipantsOverview;
}

saveProfileForm=async function(id=null){
 const existing=characterProfiles.find(profile=>profile.id===id),departmentText=document.getElementById('profileDepartmentText').value.trim(),jobText=document.getElementById('profileJobText').value.trim();
 const dep=departmentByAny(departmentText),job=dep?jobEntryByAny(dep.code,jobText):null;
 const profile={id:existing?.id||uid('profile'),label:document.getElementById('profileLabel').value.trim(),fullName:document.getElementById('profileFullName').value.trim(),department:dep?.code||"",departmentCustom:dep?"":departmentText,jobId:job?.id||"",jobCustom:job?"":jobText};
 if(!profile.label)profile.label=profile.fullName||t('newProfile');if(existing)Object.assign(existing,profile);else characterProfiles.unshift(profile);await persistProfiles();openProfilesModal();
};
editProfileForm=function(id=null){
 const profile=characterProfiles.find(item=>item.id===id)||{},departmentValue=profileDepartmentLabel(profile,lang),jobValue=profileJobLabel(profile,lang);
 const depOptions=DEPARTMENTS.filter(d=>d.code!=="ПД").map(d=>`<option value="${esc(d[lang]||d.ru)}"></option>`).join("");
 const allJobs=[...new Map(Object.values(JOBS_BY_DEPARTMENT).flat().map(job=>[job.ru,job])).values()].map(job=>`<option value="${esc(job[lang]||job.ru)}"></option>`).join("");
 modal(`<h3>${esc(id?t('profileEdit'):t('newProfile'))}</h3><div class="profile-grid"><div class="full"><label>${esc(t('profileLabel'))}</label><input id="profileLabel" value="${esc(profile.label||"")}"></div><div class="full"><label>${esc(t('profileName'))}</label><input id="profileFullName" value="${esc(profile.fullName||"")}"></div><div class="full"><label>Отдел</label><input id="profileDepartmentText" list="departmentSuggestions" value="${esc(departmentValue)}" placeholder="Выберите или введите свой отдел"><datalist id="departmentSuggestions">${depOptions}</datalist><div class="profile-freeform-note">Можно написать любое название — список служит только подсказкой.</div></div><div class="full"><label>Должность</label><input id="profileJobText" list="jobSuggestions" value="${esc(jobValue)}" placeholder="Выберите или введите свою должность"><datalist id="jobSuggestions">${allJobs}</datalist><div class="profile-freeform-note">Произвольные профессии сохраняются без ограничений.</div></div></div><div class="modal-actions"><button id="profileFormCancel">${esc(t('cancel'))}</button><button class="primary-btn" id="profileFormSave">${esc(t('profileSave'))}</button></div>`);
 document.getElementById('profileFormCancel').onclick=openProfilesModal;document.getElementById('profileFormSave').onclick=()=>saveProfileForm(id);
};

const previousRenderAll=renderAll;
renderAll=function(){previousRenderAll();bindParticipantPanel();renderBuildBadge()};
setTimeout(()=>{renderBuildBadge();bindParticipantPanel()},0);

Promise.all([loadProfilesFromFile(),loadExternalData(),loadDraftsFromFile()]).then(()=>{localStorage.setItem("ss14-character-profiles",JSON.stringify(characterProfiles));const untouched=!Object.values(current.values||{}).some(value=>String(value||"").trim());if(untouched&&currentPresetId){const preset=getPreset(currentPresetId);if(preset)current=clone({name:preset.name,variants:preset.variants,values:{},profileId:null})}renderAll();resetHistory()});
</script>
</body>
